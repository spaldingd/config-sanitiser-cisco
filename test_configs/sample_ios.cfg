! ============================================================
! Sample Cisco IOS Configuration - Sanitisation Test File
! Classic IOS (12.x / 15.x) - Access / Distribution Layer
! Covers: passwords, IPs, SNMP, BGP keys, VRFs, route-maps,
!         ACLs, EIGRP auth, crypto, descriptions, object-groups
! ============================================================

! ── HOSTNAME & DOMAIN ────────────────────────────────────────
hostname ACCESS-ROUTER-LON-03
ip domain-name internal.acmecorp.com
ip name-server 10.100.0.53

! ── SERVICE PASSWORD ENCRYPTION ──────────────────────────────
service password-encryption

! ── ENABLE ───────────────────────────────────────────────────
enable secret 5 $1$K2xP$mT9nL3vKpQ8rWzXy7sUoI3
enable password 7 110A1016141D5A5E57

! ── LOCAL USERS ──────────────────────────────────────────────
username admin privilege 15 secret 5 $1$xyz2$Ab9cKpL3vNmR4qW8tUoI12
username engineer privilege 10 password 7 060506324F41584B56
username monitor privilege 1 password 0 M0nit0r$ecret!

! ── VRF ──────────────────────────────────────────────────────
ip vrf CUSTOMER-ACME
 description VRF for ACME Corp - Access Layer
 rd 65001:100
 route-target export 65001:100
 route-target import 65001:100

ip vrf MGMT-OOB
 description Out-of-band management VRF
 rd 65001:999

! ── INTERFACES ───────────────────────────────────────────────
interface Loopback0
 description Router Loopback - IGP RID ACCESS-ROUTER-LON-03
 ip address 10.0.0.5 255.255.255.255

interface FastEthernet0/0
 description Uplink to DISTRIBUTION-SWITCH-LON-01 - Trunk
 ip address 10.3.0.2 255.255.255.252
 ip access-group BLOCK-INBOUND-THREATS in
 duplex full
 speed 100
 no shutdown

interface FastEthernet0/1
 description Link to CUSTOMER-ACME CPE Device - Site A
 ip vrf forwarding CUSTOMER-ACME
 ip address 172.16.30.1 255.255.255.252
 ip authentication mode eigrp 200 md5
 ip authentication key-chain eigrp 200 BACKBONE-KEYCHAIN
 no shutdown

interface FastEthernet0/2
 description OOB Management port
 ip vrf forwarding MGMT-OOB
 ip address 192.168.202.1 255.255.255.0
 no shutdown

interface Serial0/0/0
 description WAN Link to BRANCH-SITE-BIRMINGHAM - MPLS PE
 ip address 10.4.0.1 255.255.255.252
 ip access-group MATCH-MGMT-TRAFFIC out
 encapsulation ppp
 no shutdown

! ── EIGRP ────────────────────────────────────────────────────
router eigrp 100
 network 10.0.0.0
 network 172.16.0.0
 passive-interface default
 no passive-interface FastEthernet0/0
 no auto-summary

router eigrp 200
 address-family ipv4 vrf CUSTOMER-ACME
  network 172.16.30.0 0.0.0.3
  autonomous-system 200
  no auto-summary

! ── OSPF ─────────────────────────────────────────────────────
router ospf 1
 router-id 10.0.0.5
 area 0 authentication message-digest
 network 10.0.0.5 0.0.0.0 area 0
 network 10.3.0.0 0.0.0.3 area 0

! ── KEYCHAIN ─────────────────────────────────────────────────
key chain BACKBONE-KEYCHAIN
 key 1
  key-string 0 K3yStr!ng$ecret2024
key chain OSPF-KEYCHAIN
 key 1
  key-string 7 14141B180F0B7B7977

! ── BGP ──────────────────────────────────────────────────────
router bgp 65001
 bgp router-id 10.0.0.5
 bgp confederation identifier 65000
 bgp confederation peers 65002 65003
 bgp local-as 65100 no-prepend replace-as
 no bgp default ipv4-unicast
 !
 neighbor INTERNAL-RR peer-group
 neighbor INTERNAL-RR remote-as 65001
 neighbor INTERNAL-RR description Internal Route Reflectors
 neighbor INTERNAL-RR password 7 060506324F41584B56
 neighbor INTERNAL-RR update-source Loopback0
 !
 neighbor 10.0.0.1 peer-group INTERNAL-RR
 neighbor 10.0.0.1 description CORE-ROUTER-LON-01
 neighbor 10.0.0.2 peer-group INTERNAL-RR
 neighbor 10.0.0.2 description CORE-ROUTER-LON-02
 !
 address-family ipv4
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.1 route-map RMAP-TO-RR out
  neighbor 10.0.0.2 activate
 exit-address-family
 !
 address-family ipv4 vrf CUSTOMER-ACME
  neighbor 172.16.30.2 remote-as 65100
  neighbor 172.16.30.2 description ACME-CPE-LON-03
  neighbor 172.16.30.2 password 0 Cust0m3r@ccess!
  neighbor 172.16.30.2 activate
  neighbor 172.16.30.2 route-map RMAP-ACME-IN in
  neighbor 172.16.30.2 route-map RMAP-ACME-OUT out
 exit-address-family

! ── ROUTE MAPS ───────────────────────────────────────────────
route-map RMAP-TO-RR permit 10
 description Advertise connected and static to RR
 match ip address prefix-list PFX-OWN-PREFIXES

route-map RMAP-ACME-IN permit 10
 description Accept ACME routes from CPE
 match ip address prefix-list PFX-ACME-CUSTOMER
 set local-preference 100

route-map RMAP-ACME-OUT permit 10
 description Send default to ACME CPE
 match ip address prefix-list PFX-DEFAULT-ONLY

! ── PREFIX LISTS ─────────────────────────────────────────────
ip prefix-list PFX-OWN-PREFIXES description Our loopbacks and connected
ip prefix-list PFX-OWN-PREFIXES seq 5 permit 10.0.0.5/32
ip prefix-list PFX-OWN-PREFIXES seq 10 permit 10.3.0.0/30

ip prefix-list PFX-ACME-CUSTOMER description ACME CPE routes
ip prefix-list PFX-ACME-CUSTOMER seq 5 permit 172.16.100.0/24
ip prefix-list PFX-ACME-CUSTOMER seq 10 permit 172.16.101.0/24

ip prefix-list PFX-DEFAULT-ONLY description Default only
ip prefix-list PFX-DEFAULT-ONLY seq 5 permit 0.0.0.0/0

! ── NAMED ACLs ───────────────────────────────────────────────
ip access-list extended BLOCK-INBOUND-THREATS
 description Block RFC1918 and bogon sources inbound
 10 deny ip 10.0.0.0 0.255.255.255 any
 20 deny ip 172.16.0.0 0.15.255.255 any
 30 deny ip 192.168.0.0 0.0.255.255 any
 1000 permit ip any any

ip access-list extended MATCH-MGMT-TRAFFIC
 description Management plane traffic
 10 permit tcp any 10.50.0.0 0.0.0.255 eq 22
 20 permit tcp any 10.50.0.0 0.0.0.255 eq 443
 30 permit udp any 10.50.0.0 0.0.0.255 eq 161

ip access-list standard SNMP-ACCESS-LIST
 description Permit NMS sources
 10 permit 10.50.2.0 0.0.0.255
 20 deny any

! ── OBJECT GROUPS ────────────────────────────────────────────
object-group network OG-MONITORING-SERVERS
 description NMS polling servers
 host 10.50.2.100
 host 10.50.2.101

object-group service OG-MGMT-SERVICES
 description Management access protocols
 tcp eq 22
 tcp eq 443

! ── SNMP ─────────────────────────────────────────────────────
snmp-server community PUBLIC-READ RO SNMP-ACCESS-LIST
snmp-server community PRIVATE-WRITE RW 10
snmp-server host 10.50.2.100 version 2c PUBLIC-READ
snmp-server location "London DC - Access Layer - Rack C04"
snmp-server contact "noc@acmecorp.com"

! ── BANNER ───────────────────────────────────────────────────
banner motd ^C
  Unauthorised access to ACME Corp property is prohibited.
  Contact NOC: noc@acmecorp.com  +44 20 7946 0000
  Site: London Access Layer - ACCESS-ROUTER-LON-03
^C

! ── CALL-HOME ────────────────────────────────────────────────
call-home
 contact-email-addr noc@acmecorp.com
 street-address 1 Network House, London EC1A 1BB
 site-id SITE-LON-ACCESS-03
 customer-id ACME-CORP-UK-12345
 phone-number +442079460000
 contract-id CON-11223344

! ── CRYPTO ───────────────────────────────────────────────────
crypto isakmp policy 10
 description IKE policy for branch VPN
 encr aes 256
 authentication pre-share
 group 14

crypto isakmp key BranchIOS$ecret! address 198.51.100.60

crypto ipsec transform-set TRANSFORM-AES256-SHA esp-aes 256 esp-sha-hmac
crypto map CRYPTO-MAP-BRANCH 10 ipsec-isakmp
 description IPsec to BRANCH-SITE-BIRMINGHAM
 set peer 198.51.100.60
 set transform-set TRANSFORM-AES256-SHA
 match address MATCH-MGMT-TRAFFIC

! ── IP SLA ───────────────────────────────────────────────────
ip sla 10
 description Probe to distribution switch gateway
 icmp-echo 10.3.0.1 source-interface FastEthernet0/0
 frequency 30
ip sla schedule 10 life forever start-time now

track 10 ip sla 10 reachability
 description Track distribution switch reachability

! ── NTP ──────────────────────────────────────────────────────
ntp authenticate
ntp authentication-key 1 md5 NtpAuth$ecretIOS!
ntp trusted-key 1
ntp server 10.100.0.1 key 1 prefer

! ── TACACS / AAA ─────────────────────────────────────────────
aaa new-model
tacacs-server host 10.50.0.10 key 7 110A1016141D5A5E57
tacacs-server host 10.50.0.11 key 0 T@cacs$ecretIOS!
radius-server host 10.50.1.10 key 7 045802150C2E1D1C5A
aaa group server tacacs+ TACACS-GROUP
 server-private 10.50.0.10 key 7 110A1016141D5A5E57
 server-private 10.50.0.11 key 0 T@cacs$ecretIOS!
aaa group server radius RADIUS-GROUP
 server-private 10.50.1.10 auth-port 1812 acct-port 1813 key 7 045802150C2E1D1C5A
aaa authentication login default group TACACS-GROUP local
aaa authorization exec default group TACACS-GROUP local

! ── COMMUNITY LISTS ──────────────────────────────────────────
ip community-list standard COMM-UPSTREAM-LEARNED permit 65001:1000
ip community-list standard COMM-CUSTOMER-ROUTES permit 65001:2000

! ── LINE CONFIG ──────────────────────────────────────────────
line con 0
 description Console - ACCESS-ROUTER-LON-03
 exec-timeout 5 0
 logging synchronous
 password 7 13061E010803557878

line vty 0 4
 description VTY - SSH only, restricted
 access-class SNMP-ACCESS-LIST in
 exec-timeout 10 0
 transport input ssh
 password 7 060506324F41584B56
 login authentication default

! ── IPv6 ───────────────────────────────────────────────────────
! IPv6 interface addresses
interface FastEthernet0/0
 ipv6 address 2001:db8:1:3::2/64
 ipv6 address FE80::5 link-local

interface FastEthernet0/1
 ipv6 address 2001:db8:1:30::1/126

! IPv6 static route
ipv6 route ::/0 2001:db8:1:3::1

! IPv6 ACL
ipv6 access-list IPV6-BLOCK-THREATS
 deny ipv6 2001:db8:2::/48 any
 permit ipv6 any any

! IPv6 prefix list
ipv6 prefix-list PFX-IPV6-OWN seq 5 permit 2001:db8:1::/48

! BGP IPv6 neighbor
router bgp 65001
 neighbor 2001:db8:1:3::1 remote-as 65200
 neighbor 2001:db8:1:3::1 password 7 060506324F41584B56
 address-family ipv6
  neighbor 2001:db8:1:3::1 activate
  neighbor 2001:db8:1:3::1 route-map RMAP-TO-RR out
 exit-address-family

! NTP over IPv6
ntp server 2001:db8:1:100::1 key 1

! end