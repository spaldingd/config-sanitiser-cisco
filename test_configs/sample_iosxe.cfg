! ============================================================
! Sample Cisco IOS XE Configuration - Sanitisation Test File
! Covers: passwords, IPs, SNMP, BGP keys, VRFs, route-maps,
!         policy-maps, class-maps, ACLs, prefix-lists,
!         peer-groups, keychains, crypto, descriptions, SLA
! ============================================================

! ── HOSTNAME & DOMAIN ────────────────────────────────────────
hostname CORE-ROUTER-LON-01
ip domain-name internal.acmecorp.com
ip name-server 10.100.0.53
ip name-server 10.100.0.54

! ── ENABLE SECRET ────────────────────────────────────────────
enable secret 5 $1$mERr$hx5rVt7rPNoS4wqbXKX7m0

! ── LOCAL USERS ──────────────────────────────────────────────
username admin privilege 15 secret 5 $1$abc1$Xy9zKpL3vNmR2qW8tUoI41
username netops privilege 10 secret 0 NetOps$ecret2024!
username readonly privilege 1 password 7 08345A0D1C0A

! ── AAA / TACACS+ ────────────────────────────────────────────
aaa new-model
aaa authentication login default group tacacs+ local
aaa authorization exec default group tacacs+ local
tacacs server TACACS-PRIMARY
 address ipv4 10.50.0.10
 key 7 110A1016141D5A5E57
tacacs server TACACS-SECONDARY
 address ipv4 10.50.0.11
 key 0 T@cacs$ecretKey99
aaa group server tacacs+ TACACS-GROUP
 server-private 10.50.0.10 key 7 110A1016141D5A5E57
 server-private 10.50.0.11 key 0 T@cacs$ecretKey99
aaa authentication login default group TACACS-GROUP local
aaa authorization exec default group TACACS-GROUP local

! ── RADIUS ───────────────────────────────────────────────────
radius server RADIUS-SRV-01
 address ipv4 10.50.1.10 auth-port 1812 acct-port 1813
 key 7 045802150C2E1D1C5A
radius-server key 0 R@dius$ecret2024
aaa group server radius RADIUS-GROUP
 server-private 10.50.1.10 auth-port 1812 acct-port 1813 key 7 045802150C2E1D1C5A

! ── VRFs ─────────────────────────────────────────────────────
vrf definition CUSTOMER-ACME
 description VRF for ACME Corp primary services
 rd 65001:100
 route-target export 65001:100
 route-target import 65001:100
 !
 address-family ipv4
 exit-address-family

vrf definition MGMT-OOB
 description Out-of-band management VRF
 rd 65001:999
 !
 address-family ipv4
 exit-address-family

vrf definition CUSTOMER-GLOBEX
 description VRF for Globex Industries
 rd 65001:200
 route-target export 65001:200
 route-target import 65001:200

! ── INTERFACES ───────────────────────────────────────────────
interface Loopback0
 description Router Loopback - IGP RID - CORE-ROUTER-LON-01
 ip address 10.0.0.1 255.255.255.255

interface Loopback100
 description BGP Next-hop Loopback ACME VRF
 ip address 10.0.100.1 255.255.255.255
 ip vrf forwarding CUSTOMER-ACME

interface GigabitEthernet0/0/0
 description Uplink to UPSTREAM-PROVIDER-A - 10G Transit
 ip address 203.0.113.2 255.255.255.252
 ip access-group BLOCK-INBOUND-THREATS in
 service-policy input POLICY-CLASSIFY-INBOUND
 service-policy output POLICY-SHAPE-OUTBOUND
 no shutdown

interface GigabitEthernet0/0/1
 description Peering Link to CUSTOMER-ACME CE - Site London
 ip address 172.16.10.1 255.255.255.252
 ip vrf forwarding CUSTOMER-ACME
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 0 OspfK3y$ecret!
 no shutdown

interface GigabitEthernet0/0/2
 description Link to CORE-SWITCH-LON-02 - Backbone
 ip address 10.1.0.1 255.255.255.252
 service-policy input POLICY-CLASSIFY-INBOUND
 no shutdown

interface GigabitEthernet0/0/3
 description OOB Management - MGMT-OOB VRF
 ip vrf forwarding MGMT-OOB
 ip address 192.168.200.1 255.255.255.0
 no shutdown

interface Tunnel10
 description GRE Tunnel to CORE-ROUTER-MAN-01
 ip address 10.255.10.1 255.255.255.252
 tunnel source GigabitEthernet0/0/0
 tunnel destination 198.51.100.25
 tunnel key 12345678

! ── OSPF ─────────────────────────────────────────────────────
router ospf 1
 router-id 10.0.0.1
 passive-interface default
 no passive-interface GigabitEthernet0/0/2
 network 10.0.0.1 0.0.0.0 area 0
 network 10.1.0.0 0.0.0.3 area 0

! ── KEYCHAIN (EIGRP / IS-IS auth) ────────────────────────────
key chain BACKBONE-KEYCHAIN
 key 1
  key-string 0 K3yStr!ng$ecret2024
  accept-lifetime 00:00:00 Jan 1 2024 infinite
  send-lifetime 00:00:00 Jan 1 2024 infinite

key chain MGMT-KEYCHAIN
 key 1
  key-string 7 14141B180F0B7B7977

! ── BGP ──────────────────────────────────────────────────────
router bgp 65001
 bgp router-id 10.0.0.1
 bgp log-neighbor-changes
 bgp confederation identifier 65000
 bgp confederation peers 65002 65003
 bgp local-as 65100 no-prepend replace-as
 no bgp default ipv4-unicast
 !
 ! Peer Groups
 neighbor UPSTREAM-PEERS peer-group
 neighbor UPSTREAM-PEERS remote-as 65000
 neighbor UPSTREAM-PEERS description Upstream Transit Providers
 neighbor UPSTREAM-PEERS password 7 060506324F41584B56
 neighbor UPSTREAM-PEERS update-source Loopback0
 !
 neighbor INTERNAL-RR peer-group
 neighbor INTERNAL-RR remote-as 65001
 neighbor INTERNAL-RR description Internal Route Reflectors
 neighbor INTERNAL-RR password 0 iBGP$essionKey!
 neighbor INTERNAL-RR update-source Loopback0
 !
 ! Neighbours
 neighbor 203.0.113.1 peer-group UPSTREAM-PEERS
 neighbor 203.0.113.1 description UPSTREAM-PROVIDER-A - Primary Transit
 neighbor 10.0.0.2 peer-group INTERNAL-RR
 neighbor 10.0.0.2 description CORE-ROUTER-LON-02 RR peer
 neighbor 10.0.0.3 peer-group INTERNAL-RR
 neighbor 10.0.0.3 description CORE-ROUTER-MAN-01 RR peer
 !
 address-family ipv4
  neighbor 203.0.113.1 activate
  neighbor 203.0.113.1 route-map RMAP-UPSTREAM-IN in
  neighbor 203.0.113.1 route-map RMAP-UPSTREAM-OUT out
  neighbor 203.0.113.1 prefix-list PFX-ALLOWED-IN in
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.3 activate
 exit-address-family
 !
 address-family vpnv4
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.3 activate
 exit-address-family
 !
 address-family ipv4 vrf CUSTOMER-ACME
  neighbor 172.16.10.2 remote-as 65100
  neighbor 172.16.10.2 description ACME-CE-LON-01 - Customer BGP Peer
  neighbor 172.16.10.2 password 0 Cust0m3r$ecret!
  neighbor 172.16.10.2 activate
  neighbor 172.16.10.2 route-map RMAP-ACME-IN in
  neighbor 172.16.10.2 route-map RMAP-ACME-OUT out
 exit-address-family

! ── ROUTE MAPS ───────────────────────────────────────────────
route-map RMAP-UPSTREAM-IN permit 10
 description Accept default and full table from upstream
 match ip address prefix-list PFX-ALLOWED-IN
 set local-preference 150

route-map RMAP-UPSTREAM-IN deny 999
 description Deny everything else inbound from upstream

route-map RMAP-UPSTREAM-OUT permit 10
 description Advertise our own prefixes outbound only
 match ip address prefix-list PFX-OWN-PREFIXES
 set community 65001:1000

route-map RMAP-UPSTREAM-OUT deny 999
 description Block all other advertisements upstream

route-map RMAP-ACME-IN permit 10
 description Accept ACME customer routes
 match ip address prefix-list PFX-ACME-CUSTOMER
 set local-preference 100

route-map RMAP-ACME-OUT permit 10
 description Advertise default to ACME customer
 match ip address prefix-list PFX-DEFAULT-ONLY

route-map RMAP-POLICY-BASED-ROUTING permit 10
 description PBR - redirect management traffic
 match ip address acl MATCH-MGMT-TRAFFIC
 set ip next-hop 10.50.0.1

! ── PREFIX LISTS ─────────────────────────────────────────────
ip prefix-list PFX-ALLOWED-IN description Prefixes accepted from upstream transit
ip prefix-list PFX-ALLOWED-IN seq 5 permit 0.0.0.0/0
ip prefix-list PFX-ALLOWED-IN seq 10 permit 0.0.0.0/0 le 24

ip prefix-list PFX-OWN-PREFIXES description Our own address space to advertise
ip prefix-list PFX-OWN-PREFIXES seq 5 permit 203.0.113.0/24
ip prefix-list PFX-OWN-PREFIXES seq 10 permit 198.51.100.0/24

ip prefix-list PFX-ACME-CUSTOMER description ACME Corp allocated prefixes
ip prefix-list PFX-ACME-CUSTOMER seq 5 permit 172.16.100.0/24
ip prefix-list PFX-ACME-CUSTOMER seq 10 permit 172.16.101.0/24
ip prefix-list PFX-ACME-CUSTOMER seq 15 permit 172.16.102.0/24

ip prefix-list PFX-DEFAULT-ONLY description Default route only
ip prefix-list PFX-DEFAULT-ONLY seq 5 permit 0.0.0.0/0

! ── NAMED ACLs ───────────────────────────────────────────────
ip access-list extended BLOCK-INBOUND-THREATS
 description Block known threat prefixes and spoofed sources inbound
 10 deny ip 10.0.0.0 0.255.255.255 any
 20 deny ip 172.16.0.0 0.15.255.255 any
 30 deny ip 192.168.0.0 0.0.255.255 any
 40 deny ip 127.0.0.0 0.255.255.255 any
 1000 permit ip any any

ip access-list extended MATCH-MGMT-TRAFFIC
 description Match traffic destined for management plane
 10 permit tcp any 10.50.0.0 0.0.0.255 eq 22
 20 permit tcp any 10.50.0.0 0.0.0.255 eq 443
 30 permit udp any 10.50.0.0 0.0.0.255 eq 161

ip access-list standard SNMP-ACCESS-LIST
 description Permit SNMP polling sources only
 10 permit 10.50.2.0 0.0.0.255
 20 permit 10.50.3.10
 30 deny any

! ── COMMUNITY LISTS ──────────────────────────────────────────
ip community-list standard COMM-UPSTREAM-LEARNED
 permit 65001:1000
ip community-list standard COMM-CUSTOMER-ROUTES
 permit 65001:2000
ip community-list expanded COMM-BLACKHOLE-TRIGGER
 permit 65001:9999

! ── SNMP ─────────────────────────────────────────────────────
snmp-server community PUBLIC-READ RO SNMP-ACCESS-LIST
snmp-server community PRIVATE-WRITE RW 10
snmp-server community MONITOR-ONLY RO 23
snmp-server host 10.50.2.100 version 2c PUBLIC-READ
snmp-server host 10.50.2.101 version 2c PUBLIC-READ
snmp-server location "London DC - Rack A12 - U4"
snmp-server contact "noc@acmecorp.com"

! ── BANNER ───────────────────────────────────────────────────
banner motd ^C
  Unauthorised access to ACME Corp property is strictly prohibited.
  All activity is monitored and logged. Contact: noc@acmecorp.com
  Site: London Core - CORE-ROUTER-LON-01
^C

banner login ^C
  Authorised users only. ACME Corp Network Infrastructure.
^C

! ── CALL-HOME ────────────────────────────────────────────────
call-home
 contact-email-addr noc@acmecorp.com
 street-address 1 Network House, London EC1A 1BB
 site-id SITE-LON-CORE-01
 customer-id ACME-CORP-UK-12345
 phone-number +442079460000
 contract-id CON-98765432

! ── QoS CLASS MAPS ───────────────────────────────────────────
class-map match-all CMAP-VOICE-RTP
 description Match RTP voice traffic
 match dscp ef
 match protocol rtp

class-map match-all CMAP-VIDEO-CONFERENCING
 description Match video conferencing traffic
 match dscp af41
 match protocol rtsp

class-map match-any CMAP-CRITICAL-DATA
 description Match business critical applications
 match dscp af31
 match access-group name MATCH-MGMT-TRAFFIC

class-map match-all CMAP-SCAVENGER
 description Match low-priority bulk traffic
 match dscp cs1

! ── QoS POLICY MAPS ──────────────────────────────────────────
policy-map POLICY-CLASSIFY-INBOUND
 description Classify and mark inbound traffic at edge
 class CMAP-VOICE-RTP
  set dscp ef
  police rate 10m burst 200k
 class CMAP-VIDEO-CONFERENCING
  set dscp af41
  police rate 50m burst 1m
 class CMAP-CRITICAL-DATA
  set dscp af31
 class CMAP-SCAVENGER
  set dscp cs1
 class class-default
  set dscp default

policy-map POLICY-SHAPE-OUTBOUND
 description Shape and queue outbound traffic
 class CMAP-VOICE-RTP
  priority level 1
  police rate percent 10
 class CMAP-VIDEO-CONFERENCING
  priority level 2
  police rate percent 20
 class CMAP-CRITICAL-DATA
  bandwidth remaining percent 40
 class CMAP-SCAVENGER
  bandwidth remaining percent 5
 class class-default
  bandwidth remaining percent 35
  fair-queue

! ── CRYPTO / IPSEC ───────────────────────────────────────────
crypto isakmp policy 10
 description IKEv1 policy for branch site VPNs
 encr aes 256
 authentication pre-share
 group 14

crypto isakmp key BranchV@nK3y! address 198.51.100.50
crypto isakmp key Backup$iteKey address 198.51.100.51

crypto ipsec transform-set TRANSFORM-AES256-SHA esp-aes 256 esp-sha-hmac
 mode tunnel

crypto map CRYPTO-MAP-BRANCH 10 ipsec-isakmp
 description IPsec tunnel to BRANCH-SITE-MANCHESTER
 set peer 198.51.100.50
 set transform-set TRANSFORM-AES256-SHA
 match address acl MATCH-MGMT-TRAFFIC

! ── OBJECT GROUPS ────────────────────────────────────────────
object-group network OG-MONITORING-SERVERS
 description NMS and monitoring server IPs
 host 10.50.2.100
 host 10.50.2.101
 10.50.3.0 255.255.255.0

object-group network OG-CUSTOMER-ACME-SITES
 description All ACME Corp site prefixes
 172.16.100.0 255.255.255.0
 172.16.101.0 255.255.255.0

object-group service OG-MGMT-SERVICES
 description Management protocols permitted
 tcp eq 22
 tcp eq 443
 udp eq 161
 udp eq 162

! ── IP SLA ───────────────────────────────────────────────────
ip sla 10
 description Probe to upstream provider gateway
 icmp-echo 203.0.113.1 source-interface GigabitEthernet0/0/0
 frequency 30
ip sla schedule 10 life forever start-time now

ip sla 20
 description Probe to ACME CE router
 icmp-echo 172.16.10.2 source-interface GigabitEthernet0/0/1
 vrf CUSTOMER-ACME
 frequency 60
ip sla schedule 20 life forever start-time now

! ── TRACK ────────────────────────────────────────────────────
track 10 ip sla 10 reachability
 description Track upstream provider reachability
 delay down 10 up 30

track 20 ip sla 20 reachability
 description Track ACME CE reachability

! ── LINE CONFIG ──────────────────────────────────────────────
line con 0
 description Console Port - CORE-ROUTER-LON-01
 exec-timeout 5 0
 logging synchronous

line vty 0 4
 description VTY access - restricted to management
 access-class SNMP-ACCESS-LIST in
 exec-timeout 10 0
 transport input ssh
 login authentication default
 password 7 13061E010803557878

line vty 5 15
 description VTY overflow lines
 access-class SNMP-ACCESS-LIST in
 exec-timeout 5 0
 transport input ssh
 login authentication default

! ── PKI CERTIFICATE ──────────────────────────────────────────
crypto pki trustpoint CORP-PKI-TRUSTPOINT
 description Corporate PKI - ACME Corp Internal CA
 enrollment url http://pki.internal.acmecorp.com
 subject-name CN=CORE-ROUTER-LON-01,OU=Network,O=ACME Corp
 revocation-check crl

crypto pki certificate chain CORP-PKI-TRUSTPOINT
 certificate self-signed 01
  3082 02A9 30820212 A0030201 02020101 300D0609
  2A864886 F70D0101 04050030 1A311830 16060355
  04031B0F 53574859 2D524F55 54455231
  quit

! ── NTP ──────────────────────────────────────────────────────
ntp authenticate
ntp authentication-key 1 md5 NtpAuth$ecret! 7
ntp trusted-key 1
ntp server 10.100.0.1 key 1 prefer
ntp server 10.100.0.2 key 1

! ── LOGGING ──────────────────────────────────────────────────
logging host 10.50.4.10
logging host 10.50.4.11
logging source-interface Loopback0
logging level informational

! ── BGP TEMPLATE (IOS XE peer-session/peer-policy) ───────────
template peer-session TMPL-IBGP-SESSION
 description Template for iBGP sessions
 remote-as 65001
 update-source Loopback0
 password 0 iBGP$essionTemplate!

template peer-policy TMPL-IBGP-POLICY
 description Template for iBGP policy
 route-map RMAP-UPSTREAM-IN in
 send-community both

! ── IPv6 ───────────────────────────────────────────────────────
! IPv6 interface addresses
interface GigabitEthernet0/0/0
 ipv6 address 2001:db8:1:113::2/126
 ipv6 address FE80::1 link-local

interface GigabitEthernet0/0/2
 ipv6 address 2001:db8:1:1::1/64

! IPv6 static route
ipv6 route ::/0 2001:db8:1:113::1

! IPv6 ACL
ipv6 access-list IPV6-BLOCK-THREATS
 deny ipv6 2001:db8:2::/48 any
 permit ipv6 any any

! IPv6 prefix list
ipv6 prefix-list PFX-IPV6-OWN seq 5 permit 2001:db8:1::/48 le 64

! BGP IPv6 neighbor
router bgp 65001
 neighbor 2001:db8:1:113::1 remote-as 65000
 neighbor 2001:db8:1:113::1 password 7 060506324F41584B56
 address-family ipv6
  neighbor 2001:db8:1:113::1 activate
  neighbor 2001:db8:1:113::1 route-map RMAP-UPSTREAM-IN in
  neighbor 2001:db8:1:113::1 route-map RMAP-UPSTREAM-OUT out
  neighbor 2001:db8:1:113::1 prefix-list PFX-IPV6-OWN out
 exit-address-family

! NTP over IPv6
ntp server 2001:db8:1:100::1 key 1

! end