    route-policy RMAP-ACME-IN in
    route-policy RMAP-ACME-OUT out
   !
  !
 !
!

!! ── QoS CLASS MAPS ───────────────────────────────────────────
class-map match-any cmap-640f
 match dscp ef
 match dscp cs6
 end-class-map
!
class-map match-any cmap-7758
 match dscp af41
 match dscp af42
 end-class-map
!
class-map match-any cmap-9b03
 match dscp af31
 match dscp af32
 end-class-map
!
class-map match-any cmap-efcb
 match dscp cs1
 end-class-map
!

!! ── QoS POLICY MAPS ──────────────────────────────────────────
policy-map pmap-d810
 description desc-f83c
 class cmap-640f
  set dscp ef
  police rate 10 mbps
 !
 class cmap-7758
  set dscp af41
  police rate 50 mbps
 !
 class cmap-9b03
  set dscp af31
 !
 class cmap-efcb
  set dscp cs1
 !
 class cmap-0bec
  set dscp default
 !
end-policy-map
!

policy-map pmap-f7f9
 description desc-281e
 class cmap-640f
  priority level 1
 !
 class cmap-7758
  priority level 2
 !
 class cmap-9b03
  bandwidth remaining percent 40
 !
 class cmap-efcb
  bandwidth remaining percent 5
 !
 class cmap-0bec
  bandwidth remaining percent 35
 !
end-policy-map
!

