! ============================================================
! Sample Cisco IOS Configuration - Sanitisation Test File
! Classic IOS (12.x / 15.x) - Access / Distribution Layer
! Covers: passwords, IPs, SNMP, BGP keys, VRFs, route-maps,
!         ACLs, EIGRP auth, crypto, descriptions, object-groups
! ============================================================

! ── HOSTNAME & DOMAIN ────────────────────────────────────────
hostname host-50ed
ip domain-name dom-24f6
ip name-server 10.134.234.220

! ── SERVICE PASSWORD ENCRYPTION ──────────────────────────────
service password-encryption

! ── ENABLE ───────────────────────────────────────────────────
enable secret 5 <REMOVED>
enable password 7 <REMOVED>

! ── LOCAL USERS ──────────────────────────────────────────────
username admin privilege 15 secret 5 <REMOVED>
username engineer privilege 10 password 7 <REMOVED>
username monitor privilege 1 password 0 <REMOVED>

! ── VRF ──────────────────────────────────────────────────────
ip vrf vrf-a48e
 description desc-a99e
 rd AS-2b08:100
 route-target export AS-2b08:100
 route-target import AS-2b08:100

ip vrf vrf-7c7d
 description desc-9d68
 rd AS-2b08:999

! ── INTERFACES ───────────────────────────────────────────────
interface Loopback0
 description desc-fbc2
 ip address 10.166.215.100 255.255.255.255

interface FastEthernet0/0
 description desc-39cc
 ip address 10.65.193.240 255.255.255.252
 ip access-group acl-6bba in
 duplex full
 speed 100
 no shutdown

interface FastEthernet0/1
 description desc-9b59
 ip vrf forwarding vrf-a48e
 ip address 172.31.125.254 255.255.255.252
 ip authentication mode eigrp 200 md5
 ip authentication key-chain eigrp 200 kc-5d12
 no shutdown

interface FastEthernet0/2
 description desc-3535
 ip vrf forwarding vrf-7c7d
 ip address 192.168.156.184 255.255.255.0
 no shutdown

interface Serial0/0/0
 description desc-a40f
 ip address 10.61.75.52 255.255.255.252
 ip access-group acl-ad94 out
 encapsulation ppp
 no shutdown

! ── EIGRP ────────────────────────────────────────────────────
router eigrp 100
 network 10.35.148.104
 network 172.20.98.2
 passive-interface default
 no passive-interface FastEthernet0/0
 no auto-summary

router eigrp 200
 address-family ipv4 vrf vrf-a48e
  network 172.22.130.208 192.168.226.158
  autonomous-system 200
  no auto-summary

! ── OSPF ─────────────────────────────────────────────────────
router ospf 1
 router-id 10.166.215.100
 area 0 authentication message-digest
 network 10.166.215.100 0.0.0.0 area 0
 network 10.63.205.32 192.168.226.158 area 0

! ── KEYCHAIN ─────────────────────────────────────────────────
key chain kc-5d12
 key 1
  <REMOVED> <REMOVED>
key chain kc-a7d0
 key 1
  <REMOVED> <REMOVED>

! ── BGP ──────────────────────────────────────────────────────
router bgp AS-2b08
 bgp router-id 10.166.215.100
 no bgp default ipv4-unicast
 !
 neighbor pg-c0b4 peer-group
 neighbor pg-c0b4 remote-as AS-2b08
 neighbor pg-c0b4 description Internal Route Reflectors
 neighbor pg-c0b4 password 7 <REMOVED>
 neighbor pg-c0b4 update-source Loopback0
 !
 neighbor 10.170.107.250 peer-group pg-c0b4
 neighbor 10.170.107.250 description CORE-ROUTER-LON-01
 neighbor 10.107.151.194 peer-group pg-c0b4
 neighbor 10.107.151.194 description CORE-ROUTER-LON-02
 !
 address-family ipv4
  neighbor 10.170.107.250 activate
  neighbor 10.170.107.250 route-map rmap-5791 out
  neighbor 10.107.151.194 activate
 exit-address-family
 !
 address-family ipv4 vrf vrf-a48e
  neighbor 172.16.163.180 remote-as AS-8a26
  neighbor 172.16.163.180 description ACME-CPE-LON-03
  neighbor 172.16.163.180 password 0 <REMOVED>
  neighbor 172.16.163.180 activate
  neighbor 172.16.163.180 route-map rmap-c404 in
  neighbor 172.16.163.180 route-map rmap-aa84 out
 exit-address-family

! ── ROUTE MAPS ───────────────────────────────────────────────
route-map rmap-5791 permit 10
 description desc-3474
 match ip address prefix-list pfx-d439

route-map rmap-c404 permit 10
 description desc-a51e
 match ip address prefix-list pfx-83ff
 set local-preference 100

route-map rmap-aa84 permit 10
 description desc-b73e
 match ip address prefix-list pfx-4766

! ── PREFIX LISTS ─────────────────────────────────────────────
ip prefix-list pfx-d439 description Our loopbacks and connected
ip prefix-list pfx-d439 seq 5 permit 10.166.215.100/32
ip prefix-list pfx-d439 seq 10 permit 10.63.205.32/30

ip prefix-list pfx-83ff description ACME CPE routes
ip prefix-list pfx-83ff seq 5 permit 172.28.136.240/24
ip prefix-list pfx-83ff seq 10 permit 172.30.33.158/24

ip prefix-list pfx-4766 description Default only
ip prefix-list pfx-4766 seq 5 permit 0.0.0.0/0

! ── NAMED ACLs ───────────────────────────────────────────────
ip access-list extended acl-6bba
 description desc-7a62
 10 deny ip 10.35.148.104 0.255.255.255 any
 20 deny ip 172.20.98.2 192.168.239.152 any
 30 deny ip 192.168.20.58 0.0.255.255 any
 1000 permit ip any any

ip access-list extended acl-ad94
 description desc-9b8d
 10 permit tcp any 10.184.42.86 0.0.0.255 eq 22
 20 permit tcp any 10.184.42.86 0.0.0.255 eq 443
 30 permit udp any 10.184.42.86 0.0.0.255 eq 161

ip access-list standard acl-be5f
 description desc-0663
 10 permit 10.53.57.160 0.0.0.255
 20 deny any

! ── OBJECT GROUPS ────────────────────────────────────────────
object-group network og-257b
 description desc-7753
 host 10.211.102.122
 host 10.28.186.28

object-group service og-e8d7
 description desc-0109
 tcp eq 22
 tcp eq 443

! ── SNMP ─────────────────────────────────────────────────────
snmp-server community <REMOVED> RO SNMP-ACCESS-LIST
snmp-server community <REMOVED> RW 10
snmp-server host 10.211.102.122 version 2c PUBLIC-READ
snmp-server location <REMOVED>
snmp-server contact "noc@acmecorp.com"

! ── CRYPTO ───────────────────────────────────────────────────
crypto isakmp policy 10
 description desc-3af2
 encr aes 256
 authentication pre-share
 group 14

crypto isakmp key <REMOVED> address 192.168.120.174

crypto ipsec transform-set TRANSFORM-AES256-SHA esp-aes 256 esp-sha-hmac
crypto map cmap-324c 10 ipsec-isakmp
 description desc-41ae
 set peer 192.168.120.174
 set transform-set TRANSFORM-AES256-SHA
 match address MATCH-MGMT-TRAFFIC

! ── IP SLA ───────────────────────────────────────────────────
ip sla sla-01a2
 description desc-5041
 icmp-echo 10.115.198.16 source-interface FastEthernet0/0
 frequency 30
ip sla schedule sla-01a2 life forever start-time now

track trk-6168 ip sla sla-01a2 reachability
 description desc-0550

! ── NTP ──────────────────────────────────────────────────────
ntp authenticate
ntp authentication-key 1 md5 <REMOVED>
ntp trusted-key 1
ntp server 10.141.56.74 key 1 prefer

! ── TACACS / AAA ─────────────────────────────────────────────
aaa new-model
tacacs-server host 10.218.182.232 key 7 <REMOVED>
tacacs-server host 10.249.203.54 key 0 <REMOVED>
radius-server host 10.116.85.42 key 7 045802150C2E1D1C5A

! ── COMMUNITY LISTS ──────────────────────────────────────────
ip community-list standard cmty-3fc3 permit 65001:1000
ip community-list standard cmty-89ba permit 65001:2000

! ── LINE CONFIG ──────────────────────────────────────────────
line con 0
 description desc-1dd0
 exec-timeout 5 0
 logging synchronous
 password 7 <REMOVED>

line vty 0 4
 description desc-2e55
 access-class acl-be5f in
 exec-timeout 10 0
 transport input ssh
 password 7 <REMOVED>
 login authentication default

! end
