! ============================================================
! Sample Cisco IOS Configuration - Sanitisation Test File
! Classic IOS (12.x / 15.x) - Access / Distribution Layer
! Covers: passwords, IPs, SNMP, BGP keys, VRFs, route-maps,
!         ACLs, EIGRP auth, crypto, descriptions, object-groups
! ============================================================

! ── HOSTNAME & DOMAIN ────────────────────────────────────────
hostname host-50ed
ip domain-name dom-24f6
ip name-server IP-d575

! ── SERVICE PASSWORD ENCRYPTION ──────────────────────────────
service password-encryption

! ── ENABLE ───────────────────────────────────────────────────
enable secret 5 <REMOVED>
enable password 7 <REMOVED>

! ── LOCAL USERS ──────────────────────────────────────────────
username user-d120 privilege 15 secret 5 <REMOVED>
username user-a8d0 privilege 10 password 7 <REMOVED>
username user-35bc privilege 1 password 0 <REMOVED>

! ── VRF ──────────────────────────────────────────────────────
ip vrf vrf-a48e
 description desc-a99e
 rd AS-2b08:100
 route-target export AS-2b08:100
 route-target import AS-2b08:100

ip vrf vrf-7c7d
 description desc-9d68
 rd AS-2b08:999

! ── INTERFACES ───────────────────────────────────────────────
interface Loopback0
 description desc-fbc2
 ip address IP-13c9 255.255.255.255

interface FastEthernet0/0
 description desc-39cc
 ip address IP-047a 255.255.255.252
 ip access-group acl-6bba in
 duplex full
 speed 100
 no shutdown

interface FastEthernet0/1
 description desc-9b59
 ip vrf forwarding vrf-a48e
 ip address IP-5e06 255.255.255.252
 ip authentication mode eigrp 200 md5
 ip authentication key-chain eigrp 200 kc-5d12
 no shutdown

interface FastEthernet0/2
 description desc-3535
 ip vrf forwarding vrf-7c7d
 ip address IP-8547 255.255.255.0
 no shutdown

interface Serial0/0/0
 description desc-a40f
 ip address IP-8c84 255.255.255.252
 ip access-group acl-ad94 out
 encapsulation ppp
 no shutdown

! ── EIGRP ────────────────────────────────────────────────────
router eigrp 100
 network IP-3686
 network IP-a47d
 passive-interface default
 no passive-interface FastEthernet0/0
 no auto-summary

router eigrp 200
 address-family ipv4 vrf vrf-a48e
  network IP-ef92 IP-c1f1
  autonomous-system 200
  no auto-summary

! ── OSPF ─────────────────────────────────────────────────────
router ospf 1
 router-id IP-13c9
 area 0 authentication message-digest
 network IP-13c9 0.0.0.0 area 0
 network IP-d071 IP-c1f1 area 0

! ── KEYCHAIN ─────────────────────────────────────────────────
key chain kc-5d12
 key <REMOVED>
  key-string <REMOVED>
key chain kc-a7d0
 key <REMOVED>
  key-string <REMOVED>

! ── BGP ──────────────────────────────────────────────────────
router bgp AS-2b08
 bgp router-id IP-13c9
 bgp confederation identifier AS-d20b
 bgp confederation peers AS-65fe AS-e2b5
 bgp local-as AS-8a26 no-prepend replace-as
 no bgp default ipv4-unicast
 !
 neighbor pg-c0b4 peer-group
 neighbor pg-c0b4 remote-as AS-2b08
 neighbor pg-c0b4 description desc-9dee
 neighbor pg-c0b4 password 7 <REMOVED>
 neighbor pg-c0b4 update-source Loopback0
 !
 neighbor IP-b766 peer-group pg-c0b4
 neighbor IP-b766 description desc-a05f
 neighbor IP-ebc1 peer-group pg-c0b4
 neighbor IP-ebc1 description desc-abac
 !
 address-family ipv4
  neighbor IP-b766 activate
  neighbor IP-b766 route-map rmap-5791 out
  neighbor IP-ebc1 activate
 exit-address-family
 !
 address-family ipv4 vrf vrf-a48e
  neighbor IP-ec41 remote-as AS-8a26
  neighbor IP-ec41 description desc-3993
  neighbor IP-ec41 password 0 <REMOVED>
  neighbor IP-ec41 activate
  neighbor IP-ec41 route-map rmap-c404 in
  neighbor IP-ec41 route-map rmap-aa84 out
 exit-address-family

! ── ROUTE MAPS ───────────────────────────────────────────────
route-map rmap-5791 permit 10
 description desc-3474
 match ip address prefix-list pfx-d439

route-map rmap-c404 permit 10
 description desc-a51e
 match ip address prefix-list pfx-83ff
 set local-preference 100

route-map rmap-aa84 permit 10
 description desc-b73e
 match ip address prefix-list pfx-4766

! ── PREFIX LISTS ─────────────────────────────────────────────
ip prefix-list pfx-d439 description desc-a50a
ip prefix-list pfx-d439 seq 5 permit IP-13c9/32
ip prefix-list pfx-d439 seq 10 permit IP-d071/30

ip prefix-list pfx-83ff description desc-c4f9
ip prefix-list pfx-83ff seq 5 permit IP-669b/24
ip prefix-list pfx-83ff seq 10 permit IP-ce7f/24

ip prefix-list pfx-4766 description desc-e34e
ip prefix-list pfx-4766 seq 5 permit 0.0.0.0/0

! ── NAMED ACLs ───────────────────────────────────────────────
ip access-list extended acl-6bba
 description desc-7a62
 10 deny ip IP-3686 0.255.255.255 any
 20 deny ip IP-a47d 0.15.255.255 any
 30 deny ip IP-9a59 0.0.255.255 any
 1000 permit ip any any

ip access-list extended acl-ad94
 description desc-9b8d
 10 permit tcp any IP-c102 0.0.0.255 eq 22
 20 permit tcp any IP-c102 0.0.0.255 eq 443
 30 permit udp any IP-c102 0.0.0.255 eq 161

ip access-list standard acl-be5f
 description desc-0663
 10 permit IP-fc3c 0.0.0.255
 20 deny any

! ── OBJECT GROUPS ────────────────────────────────────────────
object-group network og-257b
 description desc-7753
 host IP-d721
 host IP-42fd

object-group service og-e8d7
 description desc-0109
 tcp eq 22
 tcp eq 443

! ── SNMP ─────────────────────────────────────────────────────
snmp-server community snmp-1595 RO acl-be5f
snmp-server community snmp-1c0f RW 10
snmp-server host IP-d721 version 2c snmp-1595
snmp-server location <REMOVED>
snmp-server contact <REMOVED>

! ── BANNER ───────────────────────────────────────────────────
banner motd ^C
<REMOVED>
^C

! ── CALL-HOME ────────────────────────────────────────────────
call-home
 contact-email-addr <REMOVED>
 street-address <REMOVED>
 site-id <REMOVED>
 customer-id <REMOVED>
 phone-number <REMOVED>
 contract-id <REMOVED>

! ── CRYPTO ───────────────────────────────────────────────────
crypto isakmp policy 10
 description desc-3af2
 encr aes 256
 authentication pre-share
 group 14

crypto isakmp key <REMOVED> address IP-f6aa

crypto ipsec transform-set TRANSFORM-AES256-SHA esp-aes 256 esp-sha-hmac
crypto map cmap-324c 10 ipsec-isakmp
 description desc-41ae
 set peer IP-f6aa
 set transform-set TRANSFORM-AES256-SHA
 match address acl-ad94

! ── IP SLA ───────────────────────────────────────────────────
ip sla sla-01a2
 description desc-5041
 icmp-echo IP-066d source-interface FastEthernet0/0
 frequency 30
ip sla schedule sla-01a2 life forever start-time now

track trk-6168 ip sla sla-01a2 reachability
 description desc-0550

! ── NTP ──────────────────────────────────────────────────────
ntp authenticate
ntp authentication-key 1 md5 <REMOVED>
ntp trusted-key 1
ntp server IP-3011 key 1 prefer

! ── TACACS / AAA ─────────────────────────────────────────────
aaa new-model
tacacs-server host IP-a7f9 key 7 <REMOVED>
tacacs-server host IP-48e4 key 0 <REMOVED>
radius-server host IP-b0af key 7 <REMOVED>
aaa group server tacacs+ aaag-e1c6
 server-private IP-a7f9 key 7 <REMOVED>
 server-private IP-48e4 key 0 <REMOVED>
aaa group server radius aaag-b3d0
 server-private IP-b0af auth-port 1812 acct-port 1813 key 7 <REMOVED>
aaa authentication login default group aaag-e1c6 local
aaa authorization exec default group aaag-e1c6 local

! ── COMMUNITY LISTS ──────────────────────────────────────────
ip community-list standard cmty-3fc3 permit AS-2b08:1000
ip community-list standard cmty-89ba permit AS-2b08:2000

! ── LINE CONFIG ──────────────────────────────────────────────
line con 0
 description desc-1dd0
 exec-timeout 5 0
 logging synchronous
 password 7 <REMOVED>

line vty 0 4
 description desc-2e55
 access-class acl-be5f in
 exec-timeout 10 0
 transport input ssh
 password 7 <REMOVED>
 login authentication default

! ── IPv6 (NOT YET SANITISED - demonstrates current limitation) ──
! IPv6 interface addresses
interface FastEthernet0/0
 ipv6 address 2001:db8:acme:3::2/64
 ipv6 address FE80::5 link-local

interface FastEthernet0/1
 ipv6 address 2001:db8:acme:30::1/126

! IPv6 static route
ipv6 route ::/0 2001:db8:acme:3::1

! IPv6 ACL
ipv6 access-list acl-fe52
 deny ipv6 2001:db8:bad::/48 any
 permit ipv6 any any

! IPv6 prefix list
ipv6 prefix-list pfx-7380 seq 5 permit 2001:db8:acme::/48

! BGP IPv6 neighbor (password will be sanitised; address will NOT be)
router bgp AS-2b08
 neighbor 2001:db8:acme:3::1 remote-as AS-b2c4
 neighbor 2001:db8:acme:3::1 password 7 <REMOVED>
 address-family ipv6
  neighbor 2001:db8:acme:3::1 activate
  neighbor 2001:db8:acme:3::1 route-map rmap-5791 out
 exit-address-family

! NTP over IPv6 (address will NOT be sanitised)
ntp server 2001:db8:acme:100::1 key 1

! end