! ============================================================
! Sample Cisco IOS XE Configuration - Sanitisation Test File
! Covers: passwords, IPs, SNMP, BGP keys, VRFs, route-maps,
!         policy-maps, class-maps, ACLs, prefix-lists,
!         peer-groups, keychains, crypto, descriptions, SLA
! ============================================================

! ── HOSTNAME & DOMAIN ────────────────────────────────────────
hostname host-415f
ip domain-name dom-24f6
ip name-server IPv4-d575
ip name-server IPv4-f1bd

! ── ENABLE SECRET ────────────────────────────────────────────
enable secret 5 <REMOVED>

! ── LOCAL USERS ──────────────────────────────────────────────
username user-d120 privilege 15 secret 5 <REMOVED>
username user-a689 privilege 10 secret 0 <REMOVED>
username user-0c86 privilege 1 password 7 <REMOVED>

! ── AAA / TACACS+ ────────────────────────────────────────────
aaa new-model
aaa authentication login default group tacacs+ local
aaa authorization exec default group tacacs+ local
tacacs server srv-ebad
 address ipv4 IPv4-a7f9
 key 7 <REMOVED>
tacacs server srv-0f1f
 address ipv4 IPv4-48e4
 key 0 <REMOVED>
aaa group server tacacs+ aaag-e1c6
 server-private IPv4-a7f9 key 7 <REMOVED>
 server-private IPv4-48e4 key 0 <REMOVED>
aaa authentication login default group aaag-e1c6 local
aaa authorization exec default group aaag-e1c6 local

! ── RADIUS ───────────────────────────────────────────────────
radius server srv-3e01
 address ipv4 IPv4-b0af auth-port 1812 acct-port 1813
 key 7 <REMOVED>
radius-server key 0 <REMOVED>
aaa group server radius aaag-b3d0
 server-private IPv4-b0af auth-port 1812 acct-port 1813 key 7 <REMOVED>

! ── VRFs ─────────────────────────────────────────────────────
vrf definition vrf-a48e
 description desc-fd32
 rd AS-2b08:100
 route-target export AS-2b08:100
 route-target import AS-2b08:100
 !
 address-family ipv4
 exit-address-family

vrf definition vrf-7c7d
 description desc-9d68
 rd AS-2b08:999
 !
 address-family ipv4
 exit-address-family

vrf definition vrf-ea02
 description desc-7188
 rd AS-2b08:200
 route-target export AS-2b08:200
 route-target import AS-2b08:200

! ── INTERFACES ───────────────────────────────────────────────
interface Loopback0
 description desc-eb0d
 ip address IPv4-b766 255.255.255.255

interface Loopback100
 description desc-9f46
 ip address IPv4-3e57 255.255.255.255
 ip vrf forwarding vrf-a48e

interface GigabitEthernet0/0/0
 description desc-5922
 ip address IPv4-d21f 255.255.255.252
 ip access-group acl-6bba in
 service-policy input pmap-d810
 service-policy output pmap-f7f9
 no shutdown

interface GigabitEthernet0/0/1
 description desc-e227
 ip address IPv4-cee1 255.255.255.252
 ip vrf forwarding vrf-a48e
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 0 <REMOVED>
 no shutdown

interface GigabitEthernet0/0/2
 description desc-55b0
 ip address IPv4-ca31 255.255.255.252
 service-policy input pmap-d810
 no shutdown

interface GigabitEthernet0/0/3
 description desc-2308
 ip vrf forwarding vrf-7c7d
 ip address IPv4-30e9 255.255.255.0
 no shutdown

interface Tunnel10
 description desc-b11f
 ip address IPv4-b226 255.255.255.252
 tunnel source GigabitEthernet0/0/0
 tunnel destination IPv4-447c
 tunnel key <REMOVED>

! ── OSPF ─────────────────────────────────────────────────────
router ospf 1
 router-id IPv4-b766
 passive-interface default
 no passive-interface GigabitEthernet0/0/2
 network IPv4-b766 0.0.0.0 area 0
 network IPv4-0659 0.0.0.3 area 0

! ── KEYCHAIN (EIGRP / IS-IS auth) ────────────────────────────
key chain kc-5d12
 key <REMOVED>
  key-string <REMOVED>
  accept-lifetime 00:00:00 Jan 1 2024 infinite
  send-lifetime 00:00:00 Jan 1 2024 infinite

key <REMOVED> MGMT-KEYCHAIN
 key <REMOVED>
  key-string <REMOVED>

! ── BGP ──────────────────────────────────────────────────────
router bgp AS-2b08
 bgp router-id IPv4-b766
 bgp log-neighbor-changes
 bgp confederation identifier AS-d20b
 bgp confederation peers AS-65fe AS-e2b5
 bgp local-as AS-8a26 no-prepend replace-as
 no bgp default ipv4-unicast
 !
 ! Peer Groups
 neighbor pg-fb08 peer-group
 neighbor pg-fb08 remote-as AS-d20b
 neighbor pg-fb08 description desc-add9
 neighbor pg-fb08 password 7 <REMOVED>
 neighbor pg-fb08 update-source Loopback0
 !
 neighbor pg-c0b4 peer-group
 neighbor pg-c0b4 remote-as AS-2b08
 neighbor pg-c0b4 description desc-9dee
 neighbor pg-c0b4 password 0 <REMOVED>
 neighbor pg-c0b4 update-source Loopback0
 !
 ! Neighbours
 neighbor IPv4-f0d3 peer-group pg-fb08
 neighbor IPv4-f0d3 description desc-f779
 neighbor IPv4-ebc1 peer-group pg-c0b4
 neighbor IPv4-ebc1 description desc-5dcf
 neighbor IPv4-d697 peer-group pg-c0b4
 neighbor IPv4-d697 description desc-af45
 !
 address-family ipv4
  neighbor IPv4-f0d3 activate
  neighbor IPv4-f0d3 route-map rmap-6167 in
  neighbor IPv4-f0d3 route-map rmap-5923 out
  neighbor IPv4-f0d3 prefix-list pfx-64c6 in
  neighbor IPv4-ebc1 activate
  neighbor IPv4-d697 activate
 exit-address-family
 !
 address-family vpnv4
  neighbor IPv4-ebc1 activate
  neighbor IPv4-d697 activate
 exit-address-family
 !
 address-family ipv4 vrf vrf-a48e
  neighbor IPv4-7f2c remote-as AS-8a26
  neighbor IPv4-7f2c description desc-5f3d
  neighbor IPv4-7f2c password 0 <REMOVED>
  neighbor IPv4-7f2c activate
  neighbor IPv4-7f2c route-map rmap-c404 in
  neighbor IPv4-7f2c route-map rmap-aa84 out
 exit-address-family

! ── ROUTE MAPS ───────────────────────────────────────────────
route-map rmap-6167 permit 10
 description desc-1f15
 match ip address prefix-list pfx-64c6
 set local-preference 150

route-map rmap-6167 deny 999
 description desc-6cda

route-map rmap-5923 permit 10
 description desc-8009
 match ip address prefix-list pfx-d439
 set community cmty-af60

route-map rmap-5923 deny 999
 description desc-e17f

route-map rmap-c404 permit 10
 description desc-b8f5
 match ip address prefix-list pfx-83ff
 set local-preference 100

route-map rmap-aa84 permit 10
 description desc-c6b5
 match ip address prefix-list pfx-4766

route-map rmap-ad12 permit 10
 description desc-aa93
 match ip address acl acl-ad94
 set ip next-hop IPv4-27ae

! ── PREFIX LISTS ─────────────────────────────────────────────
ip prefix-list pfx-64c6 description desc-9b93
ip prefix-list pfx-64c6 seq 5 permit 0.0.0.0/0
ip prefix-list pfx-64c6 seq 10 permit 0.0.0.0/0 le 24

ip prefix-list pfx-d439 description desc-aede
ip prefix-list pfx-d439 seq 5 permit IPv4-899e/24
ip prefix-list pfx-d439 seq 10 permit IPv4-f286/24

ip prefix-list pfx-83ff description desc-431a
ip prefix-list pfx-83ff seq 5 permit IPv4-669b/24
ip prefix-list pfx-83ff seq 10 permit IPv4-ce7f/24
ip prefix-list pfx-83ff seq 15 permit IPv4-f053/24

ip prefix-list pfx-4766 description desc-bbd8
ip prefix-list pfx-4766 seq 5 permit 0.0.0.0/0

! ── NAMED ACLs ───────────────────────────────────────────────
ip access-list extended acl-6bba
 description desc-a5c0
 10 deny ip IPv4-3686 0.255.255.255 any
 20 deny ip IPv4-a47d 0.15.255.255 any
 30 deny ip IPv4-9a59 0.0.255.255 any
 40 deny ip 127.0.0.0 0.255.255.255 any
 1000 permit ip any any

ip access-list extended acl-ad94
 description desc-a537
 10 permit tcp any IPv4-c102 0.0.0.255 eq 22
 20 permit tcp any IPv4-c102 0.0.0.255 eq 443
 30 permit udp any IPv4-c102 0.0.0.255 eq 161

ip access-list standard acl-be5f
 description desc-5306
 10 permit IPv4-fc3c 0.0.0.255
 20 permit IPv4-037b
 30 deny any

! ── COMMUNITY LISTS ──────────────────────────────────────────
ip community-list standard cmty-3fc3
 permit AS-2b08:1000
ip community-list standard cmty-89ba
 permit AS-2b08:2000
ip community-list expanded cmty-a5bc
 permit AS-2b08:9999

! ── SNMP ─────────────────────────────────────────────────────
snmp-server community snmp-1595 RO acl-be5f
snmp-server community snmp-1c0f RW 10
snmp-server community snmp-dc65 RO 23
snmp-server host IPv4-d721 version 2c snmp-1595
snmp-server host IPv4-42fd version 2c snmp-1595
snmp-server location <REMOVED>
snmp-server contact <REMOVED>

! ── BANNER ───────────────────────────────────────────────────
banner motd ^C
<REMOVED>
^C

banner login ^C
<REMOVED>
^C

! ── CALL-HOME ────────────────────────────────────────────────
call-home
 contact-email-addr <REMOVED>
 street-address <REMOVED>
 site-id <REMOVED>
 customer-id <REMOVED>
 phone-number <REMOVED>
 contract-id <REMOVED>

! ── QoS CLASS MAPS ───────────────────────────────────────────
class-map match-all cmap-640f
 description desc-365d
 match dscp ef
 match protocol rtp

class-map match-all cmap-7758
 description desc-58d7
 match dscp af41
 match protocol rtsp

class-map match-any cmap-9b03
 description desc-8826
 match dscp af31
 match access-group name acl-ad94

class-map match-all cmap-efcb
 description desc-1ade
 match dscp cs1

! ── QoS POLICY MAPS ──────────────────────────────────────────
policy-map pmap-d810
 description desc-f83c
 class cmap-640f
  set dscp ef
  police rate 10m burst 200k
 class cmap-7758
  set dscp af41
  police rate 50m burst 1m
 class cmap-9b03
  set dscp af31
 class cmap-efcb
  set dscp cs1
 class class-default
  set dscp default

policy-map pmap-f7f9
 description desc-4ba6
 class cmap-640f
  priority level 1
  police rate percent 10
 class cmap-7758
  priority level 2
  police rate percent 20
 class cmap-9b03
  bandwidth remaining percent 40
 class cmap-efcb
  bandwidth remaining percent 5
 class class-default
  bandwidth remaining percent 35
  fair-queue

! ── CRYPTO / IPSEC ───────────────────────────────────────────
crypto isakmp policy 10
 description desc-ed3c
 encr aes 256
 authentication pre-share
 group 14

crypto isakmp key <REMOVED> address IPv4-7bd6
crypto isakmp key <REMOVED> address IPv4-cc71

crypto ipsec transform-set TRANSFORM-AES256-SHA esp-aes 256 esp-sha-hmac
 mode tunnel

crypto map cmap-324c 10 ipsec-isakmp
 description desc-59e9
 set peer IPv4-7bd6
 set transform-set TRANSFORM-AES256-SHA
 match address acl-8794 MATCH-MGMT-TRAFFIC

! ── OBJECT GROUPS ────────────────────────────────────────────
object-group network og-257b
 description desc-84fd
 host IPv4-d721
 host IPv4-42fd
 IPv4-431f 255.255.255.0

object-group network og-efda
 description desc-e721
 IPv4-669b 255.255.255.0
 IPv4-ce7f 255.255.255.0

object-group service og-e8d7
 description desc-2eb3
 tcp eq 22
 tcp eq 443
 udp eq 161
 udp eq 162

! ── IP SLA ───────────────────────────────────────────────────
ip sla sla-01a2
 description desc-2eb5
 icmp-echo IPv4-f0d3 source-interface GigabitEthernet0/0/0
 frequency 30
ip sla schedule sla-01a2 life forever start-time now

ip sla sla-3092
 description desc-eb13
 icmp-echo IPv4-7f2c source-interface GigabitEthernet0/0/1
 vrf vrf-a48e
 frequency 60
ip sla schedule sla-3092 life forever start-time now

! ── TRACK ────────────────────────────────────────────────────
track trk-6168 ip sla sla-01a2 reachability
 description desc-d733
 delay down 10 up 30

track trk-ff57 ip sla sla-3092 reachability
 description desc-34a7

! ── LINE CONFIG ──────────────────────────────────────────────
line con 0
 description desc-ad56
 exec-timeout 5 0
 logging synchronous

line vty 0 4
 description desc-ee92
 access-class acl-be5f in
 exec-timeout 10 0
 transport input ssh
 login authentication default
 password 7 <REMOVED>

line vty 5 15
 description desc-82bf
 access-class acl-be5f in
 exec-timeout 5 0
 transport input ssh
 login authentication default

! ── PKI CERTIFICATE ──────────────────────────────────────────
crypto pki trustpoint CORP-PKI-TRUSTPOINT
 description desc-5d5b
 enrollment url <REMOVED>
 subject-name <REMOVED>
 revocation-check crl

crypto pki certificate chain CORP-PKI-TRUSTPOINT
 certificate <REMOVED>
  quit

! ── NTP ──────────────────────────────────────────────────────
ntp authenticate
ntp authentication-key 1 md5 <REMOVED> 7
ntp trusted-key 1
ntp server IPv4-3011 key 1 prefer
ntp server IPv4-ac63 key 1

! ── LOGGING ──────────────────────────────────────────────────
logging host IPv4-bbe5
logging host IPv4-179f
logging source-interface Loopback0
logging level informational

! ── BGP TEMPLATE (IOS XE peer-session/peer-policy) ───────────
template peer-session tmpl-e831
 description desc-cf2f
 remote-as AS-2b08
 update-source Loopback0
 password 0 <REMOVED>

template peer-policy tmpl-8747
 description desc-571b
 route-map rmap-6167 in
 send-community both

! ── IPv6 (NOT YET SANITISED - demonstrates current limitation) ──
! IPv6 interface addresses
interface GigabitEthernet0/0/0
 ipv6 address IPv6-3231/126
 ipv6 address FE80::1 link-local

interface GigabitEthernet0/0/2
 ipv6 address IPv6-55f0/64

! IPv6 static route
ipv6 route ::/0 IPv6-51c1

! IPv6 ACL
ipv6 access-list acl-fe52
 deny ipv6 IPv6-f42f/48 any
 permit ipv6 any any

! IPv6 prefix list
ipv6 prefix-list pfx-7380 seq 5 permit IPv6-60dc/48 le 64

! BGP IPv6 neighbor (password will be sanitised; address will NOT be)
router bgp AS-2b08
 neighbor IPv6-51c1 remote-as AS-d20b
 neighbor IPv6-51c1 password 7 <REMOVED>
 address-family ipv6
  neighbor IPv6-51c1 activate
  neighbor IPv6-51c1 route-map rmap-6167 in
  neighbor IPv6-51c1 route-map rmap-5923 out
  neighbor IPv6-51c1 prefix-list pfx-7380 out
 exit-address-family

! NTP over IPv6 (address will NOT be sanitised)
ntp server IPv6-c3bc key 1

! end