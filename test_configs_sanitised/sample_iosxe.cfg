! ============================================================
! Sample Cisco IOS XE Configuration - Sanitisation Test File
! Covers: passwords, IPs, SNMP, BGP keys, VRFs, route-maps,
!         policy-maps, class-maps, ACLs, prefix-lists,
!         peer-groups, keychains, crypto, descriptions, SLA
! ============================================================

! ── HOSTNAME & DOMAIN ────────────────────────────────────────
hostname host-415f
ip domain-name domain-24f6
ip name-server 10.49.225.234
ip name-server 10.92.160.202

! ── ENABLE SECRET ────────────────────────────────────────────
enable secret 5 <REMOVED>

! ── LOCAL USERS ──────────────────────────────────────────────
username admin privilege 15 secret 5 <REMOVED>
username netops privilege 10 secret 0 <REMOVED>
username readonly privilege 1 password 7 <REMOVED>

! ── AAA / TACACS+ ────────────────────────────────────────────
aaa new-model
aaa authentication login default group tacacs+ local
aaa authorization exec default group tacacs+ local
tacacs server TACACS-PRIMARY
 address ipv4 10.2.188.196
 key 7 <REMOVED>
tacacs server TACACS-SECONDARY
 address ipv4 10.75.208.18
 key 0 <REMOVED>

! ── RADIUS ───────────────────────────────────────────────────
radius server RADIUS-SRV-01
 address ipv4 10.117.115.206 auth-port 1812 acct-port 1813
 key 7 <REMOVED>
radius-server key 0 <REMOVED>

! ── VRFs ─────────────────────────────────────────────────────
vrf definition vrf-a48e
 description desc-fd32
 rd 65001:100
 route-target export 65001:100
 route-target import 65001:100
 !
 address-family ipv4
 exit-address-family

vrf vrf-541e vrf-7c7d
 description desc-9d68
 rd 65001:999
 !
 address-family ipv4
 exit-address-family

vrf vrf-541e vrf-ea02
 description desc-7188
 rd 65001:200
 route-target export 65001:200
 route-target import 65001:200

! ── INTERFACES ───────────────────────────────────────────────
interface Loopback0
 description desc-eb0d
 ip address 10.208.117.42 255.255.255.255

interface Loopback100
 description desc-9f46
 ip address 10.47.202.122 255.255.255.255
 ip vrf forwarding CUSTOMER-ACME

interface GigabitEthernet0/0/0
 description desc-5922
 ip address 192.168.69.218 192.168.220.106
 ip access-group acl-6bba in
 service-policy input pmap-d810
 service-policy output pmap-f7f9
 no shutdown

interface GigabitEthernet0/0/1
 description desc-e227
 ip address 172.31.104.120 192.168.220.106
 ip vrf forwarding CUSTOMER-ACME
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 0 <REMOVED>
 no shutdown

interface GigabitEthernet0/0/2
 description desc-55b0
 ip address 10.216.127.96 192.168.220.106
 service-policy input pmap-d810
 no shutdown

interface GigabitEthernet0/0/3
 description desc-2308
 ip vrf forwarding MGMT-OOB
 ip address 192.168.39.122 192.168.188.64
 no shutdown

interface Tunnel10
 description desc-b11f
 ip address 10.11.110.76 192.168.220.106
 tunnel source GigabitEthernet0/0/0
 tunnel destination 192.168.86.56
 tunnel key <REMOVED>

! ── OSPF ─────────────────────────────────────────────────────
router ospf 1
 router-id 10.208.117.42
 passive-interface default
 no passive-interface GigabitEthernet0/0/2
 network 10.208.117.42 0.0.0.0 area 0
 network 10.102.229.134 192.168.18.230 area 0

! ── KEYCHAIN (EIGRP / IS-IS auth) ────────────────────────────
key <REMOVED> BACKBONE-KEYCHAIN
 key 1
  <REMOVED> 0 <REMOVED>
  accept-lifetime 00:00:00 Jan 1 2024 infinite
  send-lifetime 00:00:00 Jan 1 2024 infinite

key <REMOVED> MGMT-KEYCHAIN
 key 1
  <REMOVED> 7 <REMOVED>

! ── BGP ──────────────────────────────────────────────────────
router bgp <AS-REMOVED>
 bgp router-id 10.208.117.42
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 ! Peer Groups
 neighbor pg-fb08 peer-group
 pg-c4cf UPSTREAM-PEERS remote-as <AS-REMOVED>
 neighbor UPSTREAM-PEERS description Upstream Transit Providers
 neighbor UPSTREAM-PEERS password 7 <REMOVED>
 neighbor UPSTREAM-PEERS update-source Loopback0
 !
 neighbor pg-c0b4 peer-group
 pg-c4cf INTERNAL-RR remote-as <AS-REMOVED>
 neighbor INTERNAL-RR description Internal Route Reflectors
 neighbor INTERNAL-RR password 0 <REMOVED>
 neighbor INTERNAL-RR update-source Loopback0
 !
 ! Neighbours
 neighbor 192.168.79.54 peer-group pg-fb08
 neighbor 192.168.79.54 description UPSTREAM-PROVIDER-A - Primary Transit
 neighbor 10.102.202.98 peer-group pg-c0b4
 neighbor 10.102.202.98 description CORE-ROUTER-LON-02 RR peer
 neighbor 10.158.47.20 peer-group pg-c0b4
 neighbor 10.158.47.20 description CORE-ROUTER-MAN-01 RR peer
 !
 address-family ipv4
  neighbor 192.168.79.54 activate
  neighbor 192.168.79.54 route-map rmap-6167 in
  neighbor 192.168.79.54 route-map rmap-5923 out
  neighbor 192.168.79.54 prefix-list pfx-64c6 in
  neighbor 10.102.202.98 activate
  neighbor 10.158.47.20 activate
 exit-address-family
 !
 address-family vpnv4
  neighbor 10.102.202.98 activate
  neighbor 10.158.47.20 activate
 exit-address-family
 !
 address-family ipv4 vrf vrf-a48e
  neighbor 172.29.248.200 remote-as <AS-REMOVED>
  neighbor 172.29.248.200 description ACME-CE-LON-01 - Customer BGP Peer
  neighbor 172.29.248.200 password 0 <REMOVED>
  neighbor 172.29.248.200 activate
  neighbor 172.29.248.200 route-map rmap-c404 in
  neighbor 172.29.248.200 route-map rmap-aa84 out
 exit-address-family

! ── ROUTE MAPS ───────────────────────────────────────────────
route-map rmap-71bb permit 10
 description desc-1f15
 match ip address prefix-list pfx-64c6
 set local-preference 150

route-map rmap-71bb deny 999
 description desc-6cda

route-map rmap-d625 permit 10
 description desc-8009
 match ip address prefix-list pfx-d439
 set community 65001:1000

route-map rmap-d625 deny 999
 description desc-e17f

route-map rmap-c503 permit 10
 description desc-b8f5
 match ip address prefix-list pfx-83ff
 set local-preference 100

route-map rmap-ed96 permit 10
 description desc-c6b5
 match ip address prefix-list pfx-4766

route-map rmap-a0a1 permit 10
 description desc-aa93
 match ip address acl MATCH-MGMT-TRAFFIC
 set ip next-hop 10.176.79.232

! ── PREFIX LISTS ─────────────────────────────────────────────
ip prefix-list pfx-a1ce description Prefixes accepted from upstream transit
ip prefix-list pfx-a1ce seq 5 permit 0.0.0.0/0
ip prefix-list pfx-a1ce seq 10 permit 0.0.0.0/0 le 24

ip prefix-list pfx-1fcb description Our own address space to advertise
ip prefix-list pfx-1fcb seq 5 permit 192.168.145.184/24
ip prefix-list pfx-1fcb seq 10 permit 192.168.114.188/24

ip prefix-list pfx-2aff description ACME Corp allocated prefixes
ip prefix-list pfx-2aff seq 5 permit 172.26.17.102/24
ip prefix-list pfx-2aff seq 10 permit 172.25.147.214/24
ip prefix-list pfx-2aff seq 15 permit 172.29.203.110/24

ip prefix-list pfx-9d98 description Default route only
ip prefix-list pfx-9d98 seq 5 permit 0.0.0.0/0

! ── NAMED ACLs ───────────────────────────────────────────────
ip access-list extended acl-6bba
 description desc-a5c0
 10 deny ip 10.147.230.170 192.168.38.64 any
 20 deny ip 172.31.183.226 192.168.103.242 any
 30 deny ip 192.168.157.186 192.168.184.24 any
 40 deny ip 127.0.0.0 192.168.38.64 any
 1000 permit ip any any

ip access-list extended acl-ad94
 description desc-a537
 10 permit tcp any 10.4.245.42 192.168.4.66 eq 22
 20 permit tcp any 10.4.245.42 192.168.4.66 eq 443
 30 permit udp any 10.4.245.42 192.168.4.66 eq 161

ip access-list standard acl-be5f
 description desc-5306
 10 permit 10.137.218.140 192.168.4.66
 20 permit 10.132.104.98
 30 deny any

! ── COMMUNITY LISTS ──────────────────────────────────────────
ip community-list standard cmty-3fc3
 permit 65001:1000
ip community-list standard cmty-89ba
 permit 65001:2000
ip community-list cmty-f803 COMM-BLACKHOLE-TRIGGER
 permit 65001:9999

! ── SNMP ─────────────────────────────────────────────────────
snmp-server community <REMOVED> RO SNMP-ACCESS-LIST
snmp-server community <REMOVED> RW 10
snmp-server community <REMOVED> RO 23
snmp-server host 10.29.2.104 version 2c PUBLIC-READ
snmp-server host 10.154.254.218 version 2c PUBLIC-READ
snmp-server location "London DC - Rack A12 - U4"
snmp-server contact "noc@acmecorp.com"

! ── QoS CLASS MAPS ───────────────────────────────────────────
class-map match-all cmap-640f
 description desc-365d
 match dscp ef
 match protocol rtp

class-map match-all cmap-7758
 description desc-58d7
 match dscp af41
 match protocol rtsp

class-map match-any cmap-9b03
 description desc-8826
 match dscp af31
 match access-group name MATCH-MGMT-TRAFFIC

class-map match-all cmap-efcb
 description desc-1ade
 match dscp cs1

! ── QoS POLICY MAPS ──────────────────────────────────────────
policy-map pmap-d810
 description desc-f83c
 class cmap-640f
  set dscp ef
  police rate 10m burst 200k
 class cmap-7758
  set dscp af41
  police rate 50m burst 1m
 class cmap-9b03
  set dscp af31
 class cmap-efcb
  set dscp cs1
 class cmap-0bec
  set dscp default

policy-map pmap-f7f9
 description desc-4ba6
 class cmap-640f
  priority level 1
  police rate percent 10
 class cmap-7758
  priority level 2
  police rate percent 20
 class cmap-9b03
  bandwidth remaining percent 40
 class cmap-efcb
  bandwidth remaining percent 5
 class cmap-0bec
  bandwidth remaining percent 35
  fair-queue

! ── CRYPTO / IPSEC ───────────────────────────────────────────
crypto isakmp policy 10
 description desc-ed3c
 encr aes 256
 authentication pre-share
 group 14

crypto isakmp key BranchV@nK3y! address 192.168.97.32
crypto isakmp key Backup$iteKey address 192.168.128.74

crypto ipsec transform-set TRANSFORM-AES256-SHA esp-aes 256 esp-sha-hmac
 mode tunnel

crypto map cmap-324c 10 ipsec-isakmp
 description desc-59e9
 set peer 192.168.97.32
 set transform-set TRANSFORM-AES256-SHA
 match address acl MATCH-MGMT-TRAFFIC

! ── OBJECT GROUPS ────────────────────────────────────────────
object-group network og-257b
 description desc-84fd
 host 10.29.2.104
 host 10.154.254.218
 10.54.207.218 192.168.188.64

object-group network og-efda
 description desc-e721
 172.26.17.102 192.168.188.64
 172.25.147.214 192.168.188.64

object-group service og-e8d7
 description desc-2eb3
 tcp eq 22
 tcp eq 443
 udp eq 161
 udp eq 162

! ── IP SLA ───────────────────────────────────────────────────
ip sla sla-01a2
 description desc-2eb5
 icmp-echo 192.168.79.54 source-interface GigabitEthernet0/0/0
 frequency 30
ip sla schedule 10 life forever start-time now

ip sla sla-3092
 description desc-eb13
 icmp-echo 172.29.248.200 source-interface GigabitEthernet0/0/1
 vrf vrf-a48e
 frequency 60
ip sla schedule 20 life forever start-time now

! ── TRACK ────────────────────────────────────────────────────
track trk-6168 ip sla 10 reachability
 description desc-d733
 delay down 10 up 30

track trk-ff57 ip sla 20 reachability
 description desc-34a7

! ── LINE CONFIG ──────────────────────────────────────────────
line con 0
 description desc-ad56
 exec-timeout 5 0
 logging synchronous

line vty 0 4
 description desc-ee92
 access-class acl-be5f in
 exec-timeout 10 0
 transport input ssh
 login authentication default
 password <REMOVED> <REMOVED>

line vty 5 15
 description desc-82bf
 access-class acl-be5f in
 exec-timeout 5 0
 transport input ssh
 login authentication default

! ── PKI CERTIFICATE ──────────────────────────────────────────
crypto pki trustpoint CORP-PKI-TRUSTPOINT
 description desc-5d5b
 enrollment url http://pki.internal.acmecorp.com
 subject-name CN=CORE-ROUTER-LON-01,OU=Network,O=ACME Corp
 revocation-check crl

crypto pki certificate chain CORP-PKI-TRUSTPOINT
 certificate <REMOVED>
  quit

! ── NTP ──────────────────────────────────────────────────────
ntp authenticate
ntp authentication-key 1 md5 NtpAuth$ecret! 7
ntp trusted-key 1
ntp server 10.146.85.68 key 1 prefer
ntp server 10.186.213.88 key 1

! ── LOGGING ──────────────────────────────────────────────────
logging host 10.129.120.50
logging host 10.243.221.182
logging source-interface Loopback0
logging level informational

! ── BGP TEMPLATE (IOS XE peer-session/peer-policy) ───────────
template tmpl-a166 TMPL-IBGP-SESSION
 description desc-cf2f
 remote-as 65001
 update-source Loopback0
 password <REMOVED> iBGP$essionTemplate!

template tmpl-2389 TMPL-IBGP-POLICY
 description desc-571b
 route-map rmap-6167 in
 send-community both

! end
