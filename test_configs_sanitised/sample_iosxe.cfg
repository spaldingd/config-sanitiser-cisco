! ============================================================
! Sample Cisco IOS XE Configuration - Sanitisation Test File
! Covers: passwords, IPs, SNMP, BGP keys, VRFs, route-maps,
!         policy-maps, class-maps, ACLs, prefix-lists,
!         peer-groups, keychains, crypto, descriptions, SLA
! ============================================================

! ── HOSTNAME & DOMAIN ────────────────────────────────────────
hostname host-415f
ip domain-name dom-24f6
ip name-server 10.134.234.220
ip name-server 10.61.40.190

! ── ENABLE SECRET ────────────────────────────────────────────
enable secret 5 <REMOVED>

! ── LOCAL USERS ──────────────────────────────────────────────
username admin privilege 15 secret 5 <REMOVED>
username netops privilege 10 secret 0 <REMOVED>
username readonly privilege 1 password 7 <REMOVED>

! ── AAA / TACACS+ ────────────────────────────────────────────
aaa new-model
aaa authentication login default group tacacs+ local
aaa authorization exec default group tacacs+ local
tacacs server TACACS-PRIMARY
 address ipv4 10.218.182.232
 key 7 <REMOVED>
tacacs server TACACS-SECONDARY
 address ipv4 10.249.203.54
 key 0 <REMOVED>

! ── RADIUS ───────────────────────────────────────────────────
radius server RADIUS-SRV-01
 address ipv4 10.116.85.42 auth-port 1812 acct-port 1813
 key 7 <REMOVED>
radius-server key 0 <REMOVED>

! ── VRFs ─────────────────────────────────────────────────────
vrf definition vrf-a48e
 description desc-fd32
 rd AS-2b08:100
 route-target export AS-2b08:100
 route-target import AS-2b08:100
 !
 address-family ipv4
 exit-address-family

vrf definition vrf-7c7d
 description desc-9d68
 rd AS-2b08:999
 !
 address-family ipv4
 exit-address-family

vrf definition vrf-ea02
 description desc-7188
 rd AS-2b08:200
 route-target export AS-2b08:200
 route-target import AS-2b08:200

! ── INTERFACES ───────────────────────────────────────────────
interface Loopback0
 description desc-eb0d
 ip address 10.170.107.250 255.255.255.255

interface Loopback100
 description desc-9f46
 ip address 10.228.97.152 255.255.255.255
 ip vrf forwarding vrf-a48e

interface GigabitEthernet0/0/0
 description desc-5922
 ip address 192.168.188.1 255.255.255.252
 ip access-group acl-6bba in
 service-policy input pmap-d810
 service-policy output pmap-f7f9
 no shutdown

interface GigabitEthernet0/0/1
 description desc-e227
 ip address 172.27.243.158 255.255.255.252
 ip vrf forwarding vrf-a48e
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 0 <REMOVED>
 no shutdown

interface GigabitEthernet0/0/2
 description desc-55b0
 ip address 10.93.103.122 255.255.255.252
 service-policy input pmap-d810
 no shutdown

interface GigabitEthernet0/0/3
 description desc-2308
 ip vrf forwarding vrf-7c7d
 ip address 192.168.46.252 255.255.255.0
 no shutdown

interface Tunnel10
 description desc-b11f
 ip address 10.5.124.166 255.255.255.252
 tunnel source GigabitEthernet0/0/0
 tunnel destination 192.168.139.122
 tunnel key <REMOVED>

! ── OSPF ─────────────────────────────────────────────────────
router ospf 1
 router-id 10.170.107.250
 passive-interface default
 no passive-interface GigabitEthernet0/0/2
 network 10.170.107.250 0.0.0.0 area 0
 network 10.180.255.92 192.168.226.158 area 0

! ── KEYCHAIN (EIGRP / IS-IS auth) ────────────────────────────
key chain kc-5d12
 key 1
  <REMOVED> <REMOVED>
  accept-lifetime 00:00:00 Jan 1 2024 infinite
  send-lifetime 00:00:00 Jan 1 2024 infinite

key <REMOVED> MGMT-KEYCHAIN
 key 1
  <REMOVED> <REMOVED>

! ── BGP ──────────────────────────────────────────────────────
router bgp AS-2b08
 bgp router-id 10.170.107.250
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 ! Peer Groups
 neighbor pg-fb08 peer-group
 neighbor pg-fb08 remote-as AS-d20b
 neighbor pg-fb08 description Upstream Transit Providers
 neighbor pg-fb08 password 7 <REMOVED>
 neighbor pg-fb08 update-source Loopback0
 !
 neighbor pg-c0b4 peer-group
 neighbor pg-c0b4 remote-as AS-2b08
 neighbor pg-c0b4 description Internal Route Reflectors
 neighbor pg-c0b4 password 0 <REMOVED>
 neighbor pg-c0b4 update-source Loopback0
 !
 ! Neighbours
 neighbor 192.168.226.128 peer-group pg-fb08
 neighbor 192.168.226.128 description UPSTREAM-PROVIDER-A - Primary Transit
 neighbor 10.107.151.194 peer-group pg-c0b4
 neighbor 10.107.151.194 description CORE-ROUTER-LON-02 RR peer
 neighbor 10.146.228.94 peer-group pg-c0b4
 neighbor 10.146.228.94 description CORE-ROUTER-MAN-01 RR peer
 !
 address-family ipv4
  neighbor 192.168.226.128 activate
  neighbor 192.168.226.128 route-map rmap-6167 in
  neighbor 192.168.226.128 route-map rmap-5923 out
  neighbor 192.168.226.128 prefix-list pfx-64c6 in
  neighbor 10.107.151.194 activate
  neighbor 10.146.228.94 activate
 exit-address-family
 !
 address-family vpnv4
  neighbor 10.107.151.194 activate
  neighbor 10.146.228.94 activate
 exit-address-family
 !
 address-family ipv4 vrf vrf-a48e
  neighbor 172.27.45.190 remote-as AS-8a26
  neighbor 172.27.45.190 description ACME-CE-LON-01 - Customer BGP Peer
  neighbor 172.27.45.190 password 0 <REMOVED>
  neighbor 172.27.45.190 activate
  neighbor 172.27.45.190 route-map rmap-c404 in
  neighbor 172.27.45.190 route-map rmap-aa84 out
 exit-address-family

! ── ROUTE MAPS ───────────────────────────────────────────────
route-map rmap-6167 permit 10
 description desc-1f15
 match ip address prefix-list pfx-64c6
 set local-preference 150

route-map rmap-6167 deny 999
 description desc-6cda

route-map rmap-5923 permit 10
 description desc-8009
 match ip address prefix-list pfx-d439
 set community 65001:1000

route-map rmap-5923 deny 999
 description desc-e17f

route-map rmap-c404 permit 10
 description desc-b8f5
 match ip address prefix-list pfx-83ff
 set local-preference 100

route-map rmap-aa84 permit 10
 description desc-c6b5
 match ip address prefix-list pfx-4766

route-map rmap-ad12 permit 10
 description desc-aa93
 match ip address acl acl-ad94
 set ip next-hop 10.62.100.72

! ── PREFIX LISTS ─────────────────────────────────────────────
ip prefix-list pfx-64c6 description Prefixes accepted from upstream transit
ip prefix-list pfx-64c6 seq 5 permit 0.0.0.0/0
ip prefix-list pfx-64c6 seq 10 permit 0.0.0.0/0 le 24

ip prefix-list pfx-d439 description Our own address space to advertise
ip prefix-list pfx-d439 seq 5 permit 192.168.191.196/24
ip prefix-list pfx-d439 seq 10 permit 192.168.91.10/24

ip prefix-list pfx-83ff description ACME Corp allocated prefixes
ip prefix-list pfx-83ff seq 5 permit 172.28.136.240/24
ip prefix-list pfx-83ff seq 10 permit 172.30.33.158/24
ip prefix-list pfx-83ff seq 15 permit 172.23.185.254/24

ip prefix-list pfx-4766 description Default route only
ip prefix-list pfx-4766 seq 5 permit 0.0.0.0/0

! ── NAMED ACLs ───────────────────────────────────────────────
ip access-list extended acl-6bba
 description desc-a5c0
 10 deny ip 10.35.148.104 0.255.255.255 any
 20 deny ip 172.20.98.2 192.168.239.152 any
 30 deny ip 192.168.20.58 0.0.255.255 any
 40 deny ip 127.0.0.0 0.255.255.255 any
 1000 permit ip any any

ip access-list extended acl-ad94
 description desc-a537
 10 permit tcp any 10.184.42.86 0.0.0.255 eq 22
 20 permit tcp any 10.184.42.86 0.0.0.255 eq 443
 30 permit udp any 10.184.42.86 0.0.0.255 eq 161

ip access-list standard acl-be5f
 description desc-5306
 10 permit 10.53.57.160 0.0.0.255
 20 permit 10.231.0.50
 30 deny any

! ── COMMUNITY LISTS ──────────────────────────────────────────
ip community-list standard cmty-3fc3
 permit 65001:1000
ip community-list standard cmty-89ba
 permit 65001:2000
ip community-list expanded cmty-a5bc
 permit 65001:9999

! ── SNMP ─────────────────────────────────────────────────────
snmp-server community <REMOVED> RO SNMP-ACCESS-LIST
snmp-server community <REMOVED> RW 10
snmp-server community <REMOVED> RO 23
snmp-server host 10.211.102.122 version 2c PUBLIC-READ
snmp-server host 10.28.186.28 version 2c PUBLIC-READ
snmp-server location <REMOVED>
snmp-server contact "noc@acmecorp.com"

! ── QoS CLASS MAPS ───────────────────────────────────────────
class-map match-all cmap-640f
 description desc-365d
 match dscp ef
 match protocol rtp

class-map match-all cmap-7758
 description desc-58d7
 match dscp af41
 match protocol rtsp

class-map match-any cmap-9b03
 description desc-8826
 match dscp af31
 match access-group name acl-ad94

class-map match-all cmap-efcb
 description desc-1ade
 match dscp cs1

! ── QoS POLICY MAPS ──────────────────────────────────────────
policy-map pmap-d810
 description desc-f83c
 class cmap-640f
  set dscp ef
  police rate 10m burst 200k
 class cmap-7758
  set dscp af41
  police rate 50m burst 1m
 class cmap-9b03
  set dscp af31
 class cmap-efcb
  set dscp cs1
 class class-default
  set dscp default

policy-map pmap-f7f9
 description desc-4ba6
 class cmap-640f
  priority level 1
  police rate percent 10
 class cmap-7758
  priority level 2
  police rate percent 20
 class cmap-9b03
  bandwidth remaining percent 40
 class cmap-efcb
  bandwidth remaining percent 5
 class class-default
  bandwidth remaining percent 35
  fair-queue

! ── CRYPTO / IPSEC ───────────────────────────────────────────
crypto isakmp policy 10
 description desc-ed3c
 encr aes 256
 authentication pre-share
 group 14

crypto isakmp key <REMOVED> address 192.168.177.44
crypto isakmp key <REMOVED> address 192.168.249.170

crypto ipsec transform-set TRANSFORM-AES256-SHA esp-aes 256 esp-sha-hmac
 mode tunnel

crypto map cmap-324c 10 ipsec-isakmp
 description desc-59e9
 set peer 192.168.177.44
 set transform-set TRANSFORM-AES256-SHA
 match address acl MATCH-MGMT-TRAFFIC

! ── OBJECT GROUPS ────────────────────────────────────────────
object-group network og-257b
 description desc-84fd
 host 10.211.102.122
 host 10.28.186.28
 10.49.153.28 255.255.255.0

object-group network og-efda
 description desc-e721
 172.28.136.240 255.255.255.0
 172.30.33.158 255.255.255.0

object-group service og-e8d7
 description desc-2eb3
 tcp eq 22
 tcp eq 443
 udp eq 161
 udp eq 162

! ── IP SLA ───────────────────────────────────────────────────
ip sla sla-01a2
 description desc-2eb5
 icmp-echo 192.168.226.128 source-interface GigabitEthernet0/0/0
 frequency 30
ip sla schedule sla-01a2 life forever start-time now

ip sla sla-3092
 description desc-eb13
 icmp-echo 172.27.45.190 source-interface GigabitEthernet0/0/1
 vrf vrf-a48e
 frequency 60
ip sla schedule sla-3092 life forever start-time now

! ── TRACK ────────────────────────────────────────────────────
track trk-6168 ip sla sla-01a2 reachability
 description desc-d733
 delay down 10 up 30

track trk-ff57 ip sla sla-3092 reachability
 description desc-34a7

! ── LINE CONFIG ──────────────────────────────────────────────
line con 0
 description desc-ad56
 exec-timeout 5 0
 logging synchronous

line vty 0 4
 description desc-ee92
 access-class acl-be5f in
 exec-timeout 10 0
 transport input ssh
 login authentication default
 password 7 <REMOVED>

line vty 5 15
 description desc-82bf
 access-class acl-be5f in
 exec-timeout 5 0
 transport input ssh
 login authentication default

! ── PKI CERTIFICATE ──────────────────────────────────────────
crypto pki trustpoint CORP-PKI-TRUSTPOINT
 description desc-5d5b
 enrollment url http://pki.internal.acmecorp.com
 subject-name CN=CORE-ROUTER-LON-01,OU=Network,O=ACME Corp
 revocation-check crl

crypto pki certificate chain CORP-PKI-TRUSTPOINT
 certificate <REMOVED>
  quit

! ── NTP ──────────────────────────────────────────────────────
ntp authenticate
ntp authentication-key 1 md5 <REMOVED> 7
ntp trusted-key 1
ntp server 10.141.56.74 key 1 prefer
ntp server 10.161.60.74 key 1

! ── LOGGING ──────────────────────────────────────────────────
logging host 10.55.64.114
logging host 10.170.83.230
logging source-interface Loopback0
logging level informational

! ── BGP TEMPLATE (IOS XE peer-session/peer-policy) ───────────
template peer-session tmpl-e831
 description desc-cf2f
 remote-as AS-2b08
 update-source Loopback0
 password 0 <REMOVED>

template peer-policy tmpl-8747
 description desc-571b
 route-map rmap-6167 in
 send-community both

! end
