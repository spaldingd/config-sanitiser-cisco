! ============================================================
! Sample Cisco IOS Configuration - Sanitisation Test File
! Classic IOS (12.x / 15.x) - Access / Distribution Layer
! Covers: passwords, IPs, SNMP, BGP keys, VRFs, route-maps,
!         ACLs, EIGRP auth, crypto, descriptions, object-groups
! ============================================================

! ── HOSTNAME & DOMAIN ────────────────────────────────────────
hostname host-50ed
ip domain-name domain-24f6
ip name-server 10.49.225.234

! ── SERVICE PASSWORD ENCRYPTION ──────────────────────────────
service password-encryption

! ── ENABLE ───────────────────────────────────────────────────
enable secret 5 <REMOVED>
enable password 7 <REMOVED>

! ── LOCAL USERS ──────────────────────────────────────────────
username admin privilege 15 secret 5 <REMOVED>
username engineer privilege 10 password 7 <REMOVED>
username monitor privilege 1 password 0 <REMOVED>

! ── VRF ──────────────────────────────────────────────────────
ip vrf vrf-a48e
 description desc-a99e
 rd 65001:100
 route-target export 65001:100
 route-target import 65001:100

ip vrf vrf-7c7d
 description desc-9d68
 rd 65001:999

! ── INTERFACES ───────────────────────────────────────────────
interface Loopback0
 description desc-fbc2
 ip address 10.212.227.138 255.255.255.255

interface FastEthernet0/0
 description desc-39cc
 ip address 10.237.34.40 192.168.220.106
 ip access-group acl-6bba in
 duplex full
 speed 100
 no shutdown

interface FastEthernet0/1
 description desc-9b59
 ip vrf forwarding CUSTOMER-ACME
 ip address 172.30.216.16 192.168.220.106
 ip authentication mode eigrp 200 md5
 ip authentication key-chain kc-ffc6 200 BACKBONE-KEYCHAIN
 no shutdown

interface FastEthernet0/2
 description desc-3535
 ip vrf forwarding MGMT-OOB
 ip address 192.168.18.134 192.168.188.64
 no shutdown

interface Serial0/0/0
 description desc-a40f
 ip address 10.55.62.138 192.168.220.106
 ip access-group acl-ad94 out
 encapsulation ppp
 no shutdown

! ── EIGRP ────────────────────────────────────────────────────
router eigrp 100
 network 10.147.230.170
 network 172.31.183.226
 passive-interface default
 no passive-interface FastEthernet0/0
 no auto-summary

router eigrp 200
 address-family ipv4 vrf vrf-a48e
  network 172.19.34.252 192.168.18.230
  autonomous-system 200
  no auto-summary

! ── OSPF ─────────────────────────────────────────────────────
router ospf 1
 router-id 10.212.227.138
 area 0 authentication message-digest
 network 10.212.227.138 0.0.0.0 area 0
 network 10.172.110.242 192.168.18.230 area 0

! ── KEYCHAIN ─────────────────────────────────────────────────
key <REMOVED> BACKBONE-KEYCHAIN
 key 1
  <REMOVED> 0 <REMOVED>
key <REMOVED> OSPF-KEYCHAIN
 key 1
  <REMOVED> 7 <REMOVED>

! ── BGP ──────────────────────────────────────────────────────
router bgp <AS-REMOVED>
 bgp router-id 10.212.227.138
 no bgp default ipv4-unicast
 !
 neighbor pg-c0b4 peer-group
 pg-c4cf INTERNAL-RR remote-as <AS-REMOVED>
 neighbor INTERNAL-RR description Internal Route Reflectors
 neighbor INTERNAL-RR password 7 <REMOVED>
 neighbor INTERNAL-RR update-source Loopback0
 !
 neighbor 10.208.117.42 peer-group pg-c0b4
 neighbor 10.208.117.42 description CORE-ROUTER-LON-01
 neighbor 10.102.202.98 peer-group pg-c0b4
 neighbor 10.102.202.98 description CORE-ROUTER-LON-02
 !
 address-family ipv4
  neighbor 10.208.117.42 activate
  neighbor 10.208.117.42 route-map rmap-5791 out
  neighbor 10.102.202.98 activate
 exit-address-family
 !
 address-family ipv4 vrf vrf-a48e
  neighbor 172.30.101.250 remote-as <AS-REMOVED>
  neighbor 172.30.101.250 description ACME-CPE-LON-03
  neighbor 172.30.101.250 password 0 <REMOVED>
  neighbor 172.30.101.250 activate
  neighbor 172.30.101.250 route-map rmap-c404 in
  neighbor 172.30.101.250 route-map rmap-aa84 out
 exit-address-family

! ── ROUTE MAPS ───────────────────────────────────────────────
route-map rmap-7977 permit 10
 description desc-3474
 match ip address prefix-list pfx-d439

route-map rmap-c503 permit 10
 description desc-a51e
 match ip address prefix-list pfx-83ff
 set local-preference 100

route-map rmap-ed96 permit 10
 description desc-b73e
 match ip address prefix-list pfx-4766

! ── PREFIX LISTS ─────────────────────────────────────────────
ip prefix-list pfx-1fcb description Our loopbacks and connected
ip prefix-list pfx-1fcb seq 5 permit 10.212.227.138/32
ip prefix-list pfx-1fcb seq 10 permit 10.172.110.242/30

ip prefix-list pfx-2aff description ACME CPE routes
ip prefix-list pfx-2aff seq 5 permit 172.26.17.102/24
ip prefix-list pfx-2aff seq 10 permit 172.25.147.214/24

ip prefix-list pfx-9d98 description Default only
ip prefix-list pfx-9d98 seq 5 permit 0.0.0.0/0

! ── NAMED ACLs ───────────────────────────────────────────────
ip access-list extended acl-6bba
 description desc-7a62
 10 deny ip 10.147.230.170 192.168.38.64 any
 20 deny ip 172.31.183.226 192.168.103.242 any
 30 deny ip 192.168.157.186 192.168.184.24 any
 1000 permit ip any any

ip access-list extended acl-ad94
 description desc-9b8d
 10 permit tcp any 10.4.245.42 192.168.4.66 eq 22
 20 permit tcp any 10.4.245.42 192.168.4.66 eq 443
 30 permit udp any 10.4.245.42 192.168.4.66 eq 161

ip access-list standard acl-be5f
 description desc-0663
 10 permit 10.137.218.140 192.168.4.66
 20 deny any

! ── OBJECT GROUPS ────────────────────────────────────────────
object-group network og-257b
 description desc-7753
 host 10.29.2.104
 host 10.154.254.218

object-group service og-e8d7
 description desc-0109
 tcp eq 22
 tcp eq 443

! ── SNMP ─────────────────────────────────────────────────────
snmp-server community <REMOVED> RO SNMP-ACCESS-LIST
snmp-server community <REMOVED> RW 10
snmp-server host 10.29.2.104 version 2c PUBLIC-READ
snmp-server location "London DC - Access Layer - Rack C04"
snmp-server contact "noc@acmecorp.com"

! ── CRYPTO ───────────────────────────────────────────────────
crypto isakmp policy 10
 description desc-3af2
 encr aes 256
 authentication pre-share
 group 14

crypto isakmp key BranchIOS$ecret! address 192.168.145.86

crypto ipsec transform-set TRANSFORM-AES256-SHA esp-aes 256 esp-sha-hmac
crypto map cmap-324c 10 ipsec-isakmp
 description desc-41ae
 set peer 192.168.145.86
 set transform-set TRANSFORM-AES256-SHA
 match address MATCH-MGMT-TRAFFIC

! ── IP SLA ───────────────────────────────────────────────────
ip sla sla-01a2
 description desc-5041
 icmp-echo 10.149.121.136 source-interface FastEthernet0/0
 frequency 30
ip sla schedule 10 life forever start-time now

track trk-6168 ip sla 10 reachability
 description desc-0550

! ── NTP ──────────────────────────────────────────────────────
ntp authenticate
ntp authentication-key 1 md5 NtpAuth$ecretIOS!
ntp trusted-key 1
ntp server 10.146.85.68 key 1 prefer

! ── TACACS / AAA ─────────────────────────────────────────────
aaa new-model
tacacs-server host 10.2.188.196 key 7 110A1016141D5A5E57
tacacs-server host 10.75.208.18 key 0 T@cacs$ecretIOS!
radius-server host 10.117.115.206 key 7 045802150C2E1D1C5A

! ── COMMUNITY LISTS ──────────────────────────────────────────
ip community-list standard cmty-3fc3 permit 65001:1000
ip community-list standard cmty-89ba permit 65001:2000

! ── LINE CONFIG ──────────────────────────────────────────────
line con 0
 description desc-1dd0
 exec-timeout 5 0
 logging synchronous
 password <REMOVED> <REMOVED>

line vty 0 4
 description desc-2e55
 access-class acl-be5f in
 exec-timeout 10 0
 transport input ssh
 password <REMOVED> <REMOVED>
 login authentication default

! end
